<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D - Ucrania</title>
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🌍 Visor 3D - Ucrania</div>
    <div id="cesiumContainer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Widgets/widgets.css" 
          rel="stylesheet">

    <script>
        (function() {
            // --- CONFIGURACIÓN ---
            const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZjNkNzFkMi00ZTFiLTQ4ZTktODMzMy0zMTYxZWIxNzMzZTgiLCJpZCI6NDUwMjY4LCJzdWIiOiJqYXZpZ2VvIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlZpc29ydG90YWwiLCJpYXQiOjE3ODI3NDg5MjF9.X0X1C3EcUJyzOIl76WQp_O_rYNa4bQ-0OPW9emnv2dE';
            const GEOJSON_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';

            // --- TOKEN DE CESIUM ---
            Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

            // --- CREAR VIEWER (sin terreno aún) ---
            const viewer = new Cesium.Viewer('cesiumContainer', {
                baseLayerPicker: false,
                infoBox: false,
                selectionIndicator: false,
                navigationHelpButton: false,
                timeline: false,
                animation: false,
                geocoder: false,
                homeButton: false,
                sceneModePicker: false,
            });

            // --- ✅ TERRENO CORRECTO PARA CESIUM 1.128 ---
            // Se usa Cesium.createWorldTerrainAsync() que devuelve una Promesa
            Cesium.createWorldTerrainAsync({
                requestVertexNormals: true,
                requestWaterMask: false,
            }).then(function(terrainProvider) {
                viewer.terrainProvider = terrainProvider;
                console.log('✅ Terreno 3D cargado correctamente');
            }).catch(function(error) {
                console.warn('⚠️ Error al cargar terreno:', error);
            });

            // --- IMAGEN SATÉLITE ---
            viewer.imageryLayers.addImageryProvider(
                new Cesium.ArcGisMapServerImageryProvider({
                    url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                })
            );

            // --- CARGAR DATOS ---
            fetch(GEOJSON_URL)
                .then(response => response.json())
                .then(data => {
                    const features = data.features || [];
                    const filtered = features.filter(f => (f.properties?.frp || 0) > 10);
                    const limited = filtered.slice(0, 500);

                    limited.forEach(f => {
                        const coords = f.geometry.coordinates;
                        const props = f.properties;
                        const size = Math.max(5, Math.min(20, (props.frp || 10) / 10));

                        viewer.entities.add({
                            position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1], 0),
                            point: {
                                pixelSize: size,
                                color: Cesium.Color.RED,
                                outlineColor: Cesium.Color.YELLOW,
                                outlineWidth: 2,
                                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                            },
                            properties: {
                                frp: props.frp || 0,
                                date: props.acq_date || 'N/A'
                            }
                        });
                    });

                    document.getElementById('info').textContent =
                        '🌍 Visor 3D | ' + limited.length + ' incendios | FRP > 10 MW';

                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 500000),
                        duration: 2
                    });
                })
                .catch(error => console.error('Error:', error));
        })();
    </script>
</body>
</html>
