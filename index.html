<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D - Ucrania</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        .maplibregl-popup {
            max-width: 200px;
        }
        #legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 11px;
            z-index: 1000;
            pointer-events: none;
            border: 1px solid #444;
        }
        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 6px;
            border-radius: 2px;
        }
        .legend-item {
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
    <div id="info">🌍 Visor 3D - Ucrania (cargando...)</div>
    <div id="map"></div>
    <div id="legend">
        <div class="legend-item"><span class="legend-color" style="background:#FF0000;"></span> Rusia</div>
        <div class="legend-item"><span class="legend-color" style="background:#2B7FFF;"></span> Ucrania</div>
        <div class="legend-item"><span class="legend-color" style="background:#FFA500;"></span> Zona disputada</div>
    </div>

    <script>
        // ============================================================
        // 1. CONFIGURACIÓN
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';

        // ============================================================
        // 2. MAPA CON SATÉLITE
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'satelite': {
                        type: 'raster',
                        tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                        tileSize: 256,
                        attribution: '© Esri, Maxar, Earthstar Geographics'
                    }
                },
                layers: [
                    { id: 'satelite-layer', type: 'raster', source: 'satelite' }
                ]
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 65,
            maxPitch: 85
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');
        map.addControl(new maplibregl.ScaleControl(), 'bottom-right');

        // ============================================================
        // 3. TERRENO 3D + INCENDIOS + DEEPSTATE
        // ============================================================
        map.on('load', function() {

            // --- 3.1 TERRENO 3D ---
            map.addSource('terrainSource', {
                type: 'raster-dem',
                tiles: ['https://maplibre.org/terrain/v1/terrain-rgb/{z}/{x}/{y}.png'],
                tileSize: 256,
                encoding: 'mapbox',
                maxzoom: 14
            });

            map.setTerrain({
                source: 'terrainSource',
                exaggeration: 2.0
            });

            console.log('✅ Terreno 3D activado');

            // ============================================================
            // 3.2 INCENDIOS (FIRMS)
            // ============================================================
            fetch(FIRMS_URL)
                .then(response => response.json())
                .then(data => {
                    const features = data.features || [];
                    // Filtrar FRP > 10
                    const filtered = features.filter(f => (f.properties?.frp || 0) > 10);
                    const limited = filtered.slice(0, 500);

                    console.log(`🔥 ${limited.length} incendios cargados`);

                    if (limited.length > 0) {
                        map.addSource('fires', {
                            type: 'geojson',
                            data: {
                                type: 'FeatureCollection',
                                features: limited
                            }
                        });

                        map.addLayer({
                            id: 'fires-layer',
                            type: 'circle',
                            source: 'fires',
                            paint: {
                                'circle-radius': [
                                    'interpolate', ['linear'], ['get', 'frp'],
                                    10, 4,
                                    50, 12,
                                    100, 20
                                ],
                                'circle-color': [
                                    'interpolate', ['linear'], ['get', 'frp'],
                                    10, '#FF6600',
                                    50, '#FF0000',
                                    100, '#CC0000'
                                ],
                                'circle-stroke-color': '#FFFF00',
                                'circle-stroke-width': 1,
                                'circle-opacity': 0.85,
                                'circle-stroke-opacity': 0.8
                            }
                        });

                        // Popup incendios
                        const popup = new maplibregl.Popup({
                            closeButton: true,
                            closeOnClick: false
                        });

                        map.on('click', 'fires-layer', function(e) {
                            const props = e.features[0].properties;
                            popup
                                .setLngLat(e.lngLat)
                                .setHTML(`
                                    <strong>🔥 FRP:</strong> ${props.frp || 0} MW<br>
                                    <strong>📅 Fecha:</strong> ${props.acq_date || 'N/A'}<br>
                                    <strong>🛰️ Satélite:</strong> ${props.satellite || 'N/A'}
                                `)
                                .addTo(map);
                        });

                        map.on('mouseenter', 'fires-layer', function() {
                            map.getCanvas().style.cursor = 'pointer';
                        });
                        map.on('mouseleave', 'fires-layer', function() {
                            map.getCanvas().style.cursor = '';
                        });
                    }

                    document.getElementById('info').textContent =
                        `🌍 Visor 3D | ${limited.length} incendios | Terreno activo | Satélite Esri`;
                })
                .catch(error => console.error('❌ Error FIRMS:', error));

            // ============================================================
            // 3.3 DEEPSTATE (control territorial)
            // ============================================================
            // Cargar pako para descomprimir
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
            script.onload = function() {
                cargarDeepState();
            };
            document.head.appendChild(script);

            function cargarDeepState() {
                const proxyUrl = 'https://corsproxy.io/?';
                const deepStateUrl = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';

                fetch(proxyUrl + encodeURIComponent(deepStateUrl))
                    .then(response => {
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        return response.arrayBuffer();
                    })
                    .then(buffer => {
                        const data = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                        const geojson = JSON.parse(data);

                        const features = geojson.features || [];
                        if (features.length === 0) throw new Error('Sin features');

                        // Fecha más reciente
                        const fechas = features.map(f => f.properties?.date || '');
                        const fechaMax = fechas.sort().pop();

                        const filteredFeatures = features.filter(f =>
                            (f.properties?.date || '') === fechaMax
                        );

                        if (filteredFeatures.length === 0) return;

                        map.addSource('deepstate', {
                            type: 'geojson',
                            data: {
                                type: 'FeatureCollection',
                                features: filteredFeatures
                            }
                        });

                        map.addLayer({
                            id: 'deepstate-layer',
                            type: 'fill',
                            source: 'deepstate',
                            paint: {
                                'fill-color': [
                                    'case',
                                    ['==', ['get', 'control'], 'Rusia'], '#FF0000',
                                    ['==', ['get', 'control'], 'Ukraine'], '#2B7FFF',
                                    '#FFA500'
                                ],
                                'fill-opacity': 0.5,
                                'fill-outline-color': '#FFFFFF',
                                'fill-outline-width': 1
                            }
                        });

                        map.addLayer({
                            id: 'deepstate-line',
                            type: 'line',
                            source: 'deepstate',
                            paint: {
                                'line-color': '#FFFFFF',
                                'line-width': 1.5,
                                'line-opacity': 0.7
                            }
                        });

                        console.log('✅ DeepState cargado');
                        document.getElementById('info').textContent += ' | DeepState activo';

                    })
                    .catch(error => {
                        console.warn('⚠️ Error DeepState:', error);
                        cargarDeepStateFallback();
                    });
            }

            function cargarDeepStateFallback() {
                const fallbackUrl = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/deepstate-fallback.geojson';
                fetch(fallbackUrl)
                    .then(response => response.json())
                    .then(geojson => {
                        const features = geojson.features || [];
                        if (features.length === 0) return;

                        map.addSource('deepstate-fallback', {
                            type: 'geojson',
                            data: geojson
                        });

                        map.addLayer({
                            id: 'deepstate-layer-fallback',
                            type: 'fill',
                            source: 'deepstate-fallback',
                            paint: {
                                'fill-color': '#FFA500',
                                'fill-opacity': 0.3,
                                'fill-outline-color': '#FFFFFF',
                                'fill-outline-width': 1
                            }
                        });

                        console.log('✅ DeepState fallback cargado');
                    })
                    .catch(error => console.warn('⚠️ Fallback falló:', error));
            }
        });
    </script>
</body>
</html>
