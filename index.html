<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D - Ucrania</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🌍 Visor 3D - Ucrania</div>
    <div id="map"></div>

    <script>
        // --- MAPA CON BING MAPS SATÉLITE (GRATUITO) ---
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'bing-sat': {
                        type: 'raster',
                        tiles: [
                            'https://t0.ssl.ak.dynamic.tiles.virtualearth.net/comp/ch/{quadkey}?mkt=en-US&it=A&shading=hill&n=z',
                            'https://t1.ssl.ak.dynamic.tiles.virtualearth.net/comp/ch/{quadkey}?mkt=en-US&it=A&shading=hill&n=z',
                            'https://t2.ssl.ak.dynamic.tiles.virtualearth.net/comp/ch/{quadkey}?mkt=en-US&it=A&shading=hill&n=z',
                            'https://t3.ssl.ak.dynamic.tiles.virtualearth.net/comp/ch/{quadkey}?mkt=en-US&it=A&shading=hill&n=z'
                        ],
                        tileSize: 256,
                        maxzoom: 19
                    }
                },
                layers: [
                    { id: 'bing-sat-layer', type: 'raster', source: 'bing-sat' }
                ]
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 65,
            maxPitch: 85
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // --- INYECTAR TERRENO (EL MÉTODO QUE FUNCIONA) ---
        map.on('load', function() {
            map.addSource('terrainSource', {
                type: 'raster-dem',
                tiles: ['https://maplibre.org/terrain/v1/terrain-rgb/{z}/{x}/{y}.png'],
                tileSize: 256,
                encoding: 'mapbox',
                maxzoom: 14
            });

            map.setTerrain({
                source: 'terrainSource',
                exaggeration: 2.0
            });

            document.getElementById('info').textContent =
                '🌍 Visor 3D - Ucrania | Terreno activo | Bing Satélite';
        });
    </script>
</body>
</html>
