<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D Real</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🌍 Visor 3D - Monte Fuji (prueba de relieve)</div>
    <div id="map"></div>

    <script>
        // --- INICIALIZAR MAPA EN MONTE FUJI (relieve extremo) ---
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'mapa-base': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        attribution: '© OpenStreetMap'
                    }
                },
                layers: [
                    { id: 'capa-base', type: 'raster', source: 'mapa-base' }
                ]
            },
            center: [138.7275, 35.3606], // Monte Fuji
            zoom: 12,
            pitch: 75, // Inclinación fuerte
            maxPitch: 85
        });

        // --- CONTROLES ---
        map.addControl(new maplibregl.NavigationControl());

        // --- INYECTAR TERRENO (CON SERVICIO QUE PERMITE CORS) ---
        map.on('load', () => {
            map.addSource('terrainSource', {
                type: 'raster-dem',
                tiles: ['https://maplibre.org/terrain/v1/terrain-rgb/{z}/{x}/{y}.png'],
                tileSize: 256,
                encoding: 'mapbox', // ← OBLIGATORIO para este servidor
                maxzoom: 14
            });

            map.setTerrain({
                source: 'terrainSource',
                exaggeration: 2.0
            });

            document.getElementById('info').textContent =
                '🌍 Visor 3D - Monte Fuji | Terreno activo | Mueve el mapa con clic derecho';

            console.log('✅ Terreno 3D activado');
        });
    </script>
</body>
</html>
