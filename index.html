<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D - Ucrania</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        .maplibregl-popup {
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div id="info">🌍 Visor 3D - Ucrania (cargando...)</div>
    <div id="map"></div>

    <script>
        // --- CONFIGURACIÓN ---
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';

        // --- 1. CREAR MAPA CON MAPTILER SATELLITE (COMPATIBLE CON TERRENO 3D) ---
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'satelite': {
                        type: 'raster',
                        tiles: [
                            'https://api.maptiler.com/tiles/satellite/{z}/{x}/{y}.jpg?key=YOUR_MAPTILER_KEY'
                        ],
                        tileSize: 256,
                        attribution: '© MapTiler'
                    }
                },
                layers: [
                    { id: 'satelite-layer', type: 'raster', source: 'satelite' }
                ]
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 65,
            maxPitch: 85
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // --- 2. INYECTAR TERRENO 3D (PATRÓN QUE FUNCIONA) ---
        map.on('load', function() {

            map.addSource('terrainSource', {
                type: 'raster-dem',
                tiles: ['https://maplibre.org/terrain/v1/terrain-rgb/{z}/{x}/{y}.png'],
                tileSize: 256,
                encoding: 'mapbox',
                maxzoom: 14
            });

            map.setTerrain({
                source: 'terrainSource',
                exaggeration: 2.0
            });

            console.log('✅ Terreno 3D activado');

            // --- 3. CARGAR INCENDIOS ---
            fetch(FIRMS_URL)
                .then(response => response.json())
                .then(data => {
                    const features = data.features || [];
                    const filtered = features.filter(f => (f.properties?.frp || 0) > 10);
                    const limited = filtered.slice(0, 500);

                    console.log(`🔥 ${limited.length} incendios cargados`);

                    if (limited.length > 0) {
                        map.addSource('fires', {
                            type: 'geojson',
                            data: {
                                type: 'FeatureCollection',
                                features: limited
                            }
                        });

                        map.addLayer({
                            id: 'fires-layer',
                            type: 'circle',
                            source: 'fires',
                            paint: {
                                'circle-radius': [
                                    'interpolate', ['linear'], ['get', 'frp'],
                                    10, 4,
                                    50, 12,
                                    100, 20
                                ],
                                'circle-color': [
                                    'interpolate', ['linear'], ['get', 'frp'],
                                    10, '#FF6600',
                                    50, '#FF0000',
                                    100, '#CC0000'
                                ],
                                'circle-stroke-color': '#FFFF00',
                                'circle-stroke-width': 1,
                                'circle-opacity': 0.85,
                                'circle-stroke-opacity': 0.8
                            }
                        });

                        const popup = new maplibregl.Popup({
                            closeButton: true,
                            closeOnClick: false
                        });

                        map.on('click', 'fires-layer', function(e) {
                            const props = e.features[0].properties;
                            popup
                                .setLngLat(e.lngLat)
                                .setHTML(`
                                    <strong>🔥 FRP:</strong> ${props.frp || 0} MW<br>
                                    <strong>📅 Fecha:</strong> ${props.acq_date || 'N/A'}<br>
                                    <strong>🛰️ Satélite:</strong> ${props.satellite || 'N/A'}
                                `)
                                .addTo(map);
                        });

                        map.on('mouseenter', 'fires-layer', function() {
                            map.getCanvas().style.cursor = 'pointer';
                        });
                        map.on('mouseleave', 'fires-layer', function() {
                            map.getCanvas().style.cursor = '';
                        });
                    }

                    document.getElementById('info').textContent =
                        `🌍 Visor 3D | ${limited.length} incendios | Terreno activo | MapTiler Satellite`;
                })
                .catch(error => console.error('❌ Error FIRMS:', error));
        });
    </script>
</body>
</html>
