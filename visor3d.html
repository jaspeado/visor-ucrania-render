<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Three.js + MapLibre</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-width: 350px;
            max-height: 300px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔥 Visor 3D - Semiesferas INCENDIOS</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO...');

        // ============================================================
        // 1. MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // 2. THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;
        let fireMeshes = [];
        let firesData = [];

        function initThree() {
            if (threeReady) return;
            logDebug('🔄 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            // ESCENA
            scene = new THREE.Scene();

            // CÁMARA - USANDO EL MISMO SISTEMA QUE MAPLIBRE
            camera = new THREE.Camera();
            camera.matrixAutoUpdate = false;

            // RENDERER
            renderer = new THREE.WebGLRenderer({ 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // LUCES
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Cargar datos
            loadFires();
            
            // Iniciar animación
            animate();
        }

        // ============================================================
        // 3. SISTEMA DE COORDENADAS - EL CORRECTO
        // ============================================================
        function getMercatorCoordinate(lng, lat) {
            const coord = maplibregl.MercatorCoordinate.fromLngLat(
                new maplibregl.LngLat(lng, lat)
            );
            return { x: coord.x, y: coord.y, z: coord.z || 0 };
        }

        // ============================================================
        // 4. CENTROIDE DE POLÍGONO
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // 5. SINCRONIZAR CÁMARA - MÉTODO OFICIAL
        // ============================================================
        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                // Obtener la matriz de la cámara de MapLibre
                const transform = map.transform;
                
                // Crear matriz de proyección
                const projMatrix = transform.glMatrix;
                
                // Usar la matriz de MapLibre directamente
                const m = new THREE.Matrix4().fromArray(projMatrix);
                
                // Invertir Y porque Three.js usa Y hacia arriba
                m.multiply(new THREE.Matrix4().makeScale(1, -1, 1));
                
                camera.projectionMatrix = m;
                camera.projectionMatrixInverse = new THREE.Matrix4().copy(m).invert();
                
                // Posición de la cámara
                const camPos = new THREE.Vector3();
                const mInv = new THREE.Matrix4().copy(m).invert();
                camPos.set(0, 0, 0).applyMatrix4(mInv);
                camera.position.copy(camPos);
                
                camera.updateMatrixWorld(true);

            } catch (e) {
                // Silencioso
            }
        }

        // ============================================================
        // 6. CREAR SEMIESFERA
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const mercator = getMercatorCoordinate(lon, lat);
            
            const t = Math.min(frp / 500, 1);
            // Radio en coordenadas Mercator
            const radius = 0.00008 + t * 0.0005;

            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();

            // Posición en el mapa (coordenadas Mercator)
            group.position.set(mercator.x, mercator.y, mercator.z + radius * 0.5);

            // SEMIESFERA PRINCIPAL
            const geom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 0.8 + t * 1.0,
                transparent: true,
                opacity: 0.85 + t * 0.15,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(0, 0, radius * 0.5);
            group.add(sphere);

            // GLOW
            const glowGeom = new THREE.SphereGeometry(radius * 3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.4)}, ${Math.round(b * 0.2)})`),
                transparent: true,
                opacity: 0.1 + t * 0.12,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            group.add(glow);

            // NÚCLEO
            const coreGeom = new THREE.SphereGeometry(radius * 0.4, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.8 + t * 0.2,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.copy(sphere.position);
            core.position.y += radius * 0.2;
            group.add(core);

            // ANILLO BASE
            const ringGeom = new THREE.RingGeometry(radius * 0.5, radius * 0.9, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.7)}, ${Math.round(b * 0.4)})`),
                transparent: true,
                opacity: 0.2 + t * 0.2,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const ring = new THREE.Mesh(ringGeom, ringMat);
            ring.position.set(0, 0, 0.001);
            ring.rotation.x = -Math.PI / 2;
            group.add(ring);

            group.userData = { frp, lon, lat, radius };

            return group;
        }

        // ============================================================
        // 7. ACTUALIZAR INCENDIOS
        // ============================================================
        function updateFires() {
            if (!threeReady) return;

            const enabled = document.getElementById('chk-fires').checked;
            const frpMin = parseInt(document.getElementById('frp-slider').value) || 0;

            // Limpiar
            fireMeshes.forEach(obj => {
                scene.remove(obj);
                obj.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            fireMeshes = [];

            if (!enabled || firesData.length === 0) {
                document.getElementById('stats-fires').textContent = '🔥 0';
                return;
            }

            const filtered = firesData.filter(f => {
                const frp = f.properties?.frp || 0;
                return frp >= frpMin;
            });

            document.getElementById('stats-fires').textContent = '🔥 ' + filtered.length;

            const toRender = filtered.slice(0, 200);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const group = createFireSphere(lon, lat, frp);
                    scene.add(group);
                    fireMeshes.push(group);
                } catch (e) {
                    // Silencioso
                }
            });

            logDebug(`✅ ${fireMeshes.length} semiesferas creadas`);
        }

        // ============================================================
        // 8. CARGAR DATOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';

        function loadFires() {
            logDebug('📡 Cargando incendios...');
            
            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    firesData = data.features || [];
                    logDebug(`✅ ${firesData.length} incendios`);
                    updateFires();
                })
                .catch(e => {
                    logDebug('❌ Error: ' + e.message);
                    // Crear datos de prueba
                    createTestData();
                });
        }

        // ============================================================
        // 9. DATOS DE PRUEBA
        // ============================================================
        function createTestData() {
            logDebug('🔥 Creando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100],
                [30.8, 50.6, 250],
                [30.2, 50.3, 180]
            ];
            firesData = testFires.map(([lon, lat, frp]) => ({
                properties: { frp },
                geometry: {
                    coordinates: [[[lon-0.02, lat-0.02], [lon+0.02, lat-0.02], [lon+0.02, lat+0.02], [lon-0.02, lat+0.02], [lon-0.02, lat-0.02]]]
                }
            }));
            updateFires();
        }

        // ============================================================
        // 10. ANIMACIÓN
        // ============================================================
        let lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            // Sincronizar cámara
            syncCamera();

            // Animación
            const delta = lastTime ? (time - lastTime) / 1000 : 0;
            lastTime = time;

            const timeNow = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                const speed = 0.1 + (group.userData.frp / 500) * 0.3;
                group.rotation.y += delta * speed * 0.5;

                const pulse = Math.sin(timeNow * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // 11. CONTROLES
        // ============================================================
        document.getElementById('chk-fires').addEventListener('change', updateFires);
        document.getElementById('frp-slider').addEventListener('input', function() {
            document.getElementById('val-frp').textContent = this.value;
            updateFires();
        });

        // ============================================================
        // 12. INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            logDebug('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                logDebug('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
