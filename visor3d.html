<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Ucrania 3D</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #cesium-container { width: 100vw; height: 100vh; position: relative; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
        }
        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>

    <div id="cesium-container"></div>
    <div id="info">🔥 Visor 3D - Incendios Ucrania</div>

    <script>
        console.log('🚀 INICIANDO CESIUM...');

        // ============================================================
        // 1. CESIUM
        // ============================================================
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1ZTRhMDBhNS05Y2FhLTQxYzQtYThhZC0zMjYwZDU3MjAzYWMiLCJpZCI6MjU5LCJpYXQiOjE1MzYyMzk5Mzl9.XvDdRjS7LqCw6bbBBhgMcJmz0b_9h-D7bWZ_H1XIrL8';

        const viewer = new Cesium.Viewer('cesium-container', {
            terrainProvider: Cesium.createWorldTerrain(),
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            vrButton: false
        });

        // Cámara - Ucrania
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 500000),
            orientation: {
                pitch: Cesium.Math.toRadians(-45),
                heading: Cesium.Math.toRadians(0)
            }
        });

        console.log('✅ Cesium listo');

        // ============================================================
        // 2. CENTROIDE
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // 3. CREAR SEMIESFERA 3D - MÉTODO CORRECTO
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const t = Math.min(frp / 500, 1);
            const radius = 2000 + t * 8000; // 2km a 10km
            
            // Color
            const r = 1.0;
            const g = 1.0 - t * 0.8;
            const b = 0.3 - t * 0.25;

            // Posición
            const position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);

            // ============================================================
            // CREAR SEMIESFERA CON VÉRTICES MANUALES
            // ============================================================
            const positions = [];
            const indices = [];
            const normals = [];
            const colors = [];

            // Generar semiesfera (mitad superior)
            const segments = 32;
            const color = new Cesium.Color(r, g, b, 0.8);
            
            // Vértice superior (polo)
            positions.push(0, 0, radius);
            normals.push(0, 0, 1);
            colors.push(color.red, color.green, color.blue, color.alpha);

            // Generar anillos
            for (let ring = 1; ring <= segments / 2; ring++) {
                const phi = (ring / (segments / 2)) * Math.PI / 2;
                const y = radius * Math.cos(phi);
                const rRing = radius * Math.sin(phi);
                
                for (let i = 0; i < segments; i++) {
                    const theta = (i / segments) * Math.PI * 2;
                    const x = rRing * Math.cos(theta);
                    const z = rRing * Math.sin(theta);
                    
                    positions.push(x, y, z);
                    normals.push(x / radius, y / radius, z / radius);
                    colors.push(color.red, color.green, color.blue, color.alpha);
                }
            }

            // Índices
            const rings = segments / 2;
            for (let ring = 0; ring < rings - 1; ring++) {
                const ringStart = ring * segments + 1;
                const nextRingStart = (ring + 1) * segments + 1;
                
                for (let i = 0; i < segments; i++) {
                    const a = ringStart + i;
                    const b = ringStart + (i + 1) % segments;
                    const c = nextRingStart + i;
                    const d = nextRingStart + (i + 1) % segments;
                    
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }

            // Último anillo al polo
            const lastRingStart = (rings - 1) * segments + 1;
            for (let i = 0; i < segments; i++) {
                const a = lastRingStart + i;
                const b = lastRingStart + (i + 1) % segments;
                indices.push(0, b, a);
            }

            // Crear geometría
            const geometry = new Cesium.Geometry({
                attributes: {
                    position: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.DOUBLE,
                        componentsPerAttribute: 3,
                        values: new Float64Array(positions)
                    }),
                    normal: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.FLOAT,
                        componentsPerAttribute: 3,
                        values: new Float32Array(normals)
                    }),
                    color: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.FLOAT,
                        componentsPerAttribute: 4,
                        values: new Float32Array(colors)
                    })
                },
                indices: indices,
                primitiveType: Cesium.PrimitiveType.TRIANGLES,
                boundingSphere: Cesium.BoundingSphere.fromVertices(positions)
            });

            // Matriz de transformación
            const modelMatrix = Cesium.Transforms.eastNorthUpToFixedFrame(position);

            const instance = new Cesium.GeometryInstance({
                geometry: geometry,
                modelMatrix: modelMatrix
            });

            const primitive = new Cesium.Primitive({
                geometryInstances: instance,
                appearance: new Cesium.PerInstanceColorAppearance({
                    translucent: true,
                    closed: false,
                    flat: false
                })
            });

            viewer.scene.primitives.add(primitive);

            // ============================================================
            // GLOW - Esfera más grande y difusa
            // ============================================================
            const glowPositions = [];
            const glowColors = [];
            const glowRadius = radius * 2.5;
            const glowColor = new Cesium.Color(r, g * 0.4, b * 0.2, 0.15);

            // Generar glow (más simple, menos segmentos)
            const glowSegments = 16;
            for (let ring = 0; ring <= glowSegments / 2; ring++) {
                const phi = (ring / (glowSegments / 2)) * Math.PI / 2;
                const y = glowRadius * Math.cos(phi);
                const rRing = glowRadius * Math.sin(phi);
                
                for (let i = 0; i < glowSegments; i++) {
                    const theta = (i / glowSegments) * Math.PI * 2;
                    const x = rRing * Math.cos(theta);
                    const z = rRing * Math.sin(theta);
                    
                    glowPositions.push(x, y, z);
                    glowColors.push(glowColor.red, glowColor.green, glowColor.blue, glowColor.alpha);
                }
            }

            // Índices para glow
            const glowIndices = [];
            const glowRings = glowSegments / 2;
            for (let ring = 0; ring < glowRings - 1; ring++) {
                const ringStart = ring * glowSegments;
                const nextRingStart = (ring + 1) * glowSegments;
                
                for (let i = 0; i < glowSegments; i++) {
                    const a = ringStart + i;
                    const b = ringStart + (i + 1) % glowSegments;
                    const c = nextRingStart + i;
                    const d = nextRingStart + (i + 1) % glowSegments;
                    
                    glowIndices.push(a, c, b);
                    glowIndices.push(b, c, d);
                }
            }

            const glowGeometry = new Cesium.Geometry({
                attributes: {
                    position: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.DOUBLE,
                        componentsPerAttribute: 3,
                        values: new Float64Array(glowPositions)
                    }),
                    color: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.FLOAT,
                        componentsPerAttribute: 4,
                        values: new Float32Array(glowColors)
                    })
                },
                indices: glowIndices,
                primitiveType: Cesium.PrimitiveType.TRIANGLES,
                boundingSphere: Cesium.BoundingSphere.fromVertices(glowPositions)
            });

            const glowInstance = new Cesium.GeometryInstance({
                geometry: glowGeometry,
                modelMatrix: modelMatrix
            });

            const glowPrimitive = new Cesium.Primitive({
                geometryInstances: glowInstance,
                appearance: new Cesium.PerInstanceColorAppearance({
                    translucent: true,
                    closed: false,
                    flat: true
                })
            });

            viewer.scene.primitives.add(glowPrimitive);

            return { sphere: primitive, glow: glowPrimitive };
        }

        // ============================================================
        // 4. CARGAR INCENDIOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';
        let fireObjects = [];

        function loadFires() {
            console.log('📡 Cargando incendios...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    const features = data.features || [];
                    console.log(`✅ ${features.length} incendios cargados`);
                    createFires(features);
                })
                .catch(e => {
                    console.error('Error:', e);
                    createTestFires();
                });
        }

        function createFires(features) {
            fireObjects.forEach(obj => {
                viewer.scene.primitives.remove(obj);
            });
            fireObjects = [];

            const toRender = features.slice(0, 100);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const objects = createFireSphere(lon, lat, frp);
                    fireObjects.push(objects.sphere);
                    fireObjects.push(objects.glow);
                } catch (e) {
                    console.warn('Error:', e);
                }
            });

            console.log(`✅ ${fireObjects.length / 2} semiesferas creadas`);
        }

        function createTestFires() {
            console.log('🔥 Usando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100]
            ];

            testFires.forEach(([lon, lat, frp]) => {
                const objects = createFireSphere(lon, lat, frp);
                fireObjects.push(objects.sphere);
                fireObjects.push(objects.glow);
            });

            console.log(`✅ ${fireObjects.length / 2} semiesferas de prueba`);
        }

        // ============================================================
        // 5. INICIAR
        // ============================================================
        setTimeout(() => {
            loadFires();
        }, 1000);

        console.log('🚀 Visor iniciado');
    </script>
</body>
</html>
