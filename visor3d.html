<!DOCTYPE html>
<html>
<head>
    <title>Prueba Three.js + MapLibre</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔴 ¿Ves el cubo rojo?</div>

    <script>
        console.log('🚀 INICIANDO PRUEBA...');

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 0
        });

        // ============================================================
        // THREE.JS
        // ============================================================
        function initThree() {
            console.log('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            // ESCENA
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // Fondo negro para verlo bien

            // CÁMARA
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);
            camera.lookAt(0, 0, 0);

            // RENDERER
            const renderer = new THREE.WebGLRenderer({
                alpha: true,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0xff0000, 0.3); // Fondo rojo semi-transparente para depurar
            container.appendChild(renderer.domElement);

            // ============================================================
            // CUBO ROJO GIGANTE
            // ============================================================
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 1.0
            });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // ============================================================
            // ANIMACIÓN
            // ============================================================
            function animate() {
                requestAnimationFrame(animate);

                // Rotar el cubo
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;

                renderer.render(scene, camera);
            }

            animate();

            console.log('✅ Three.js funcionando');
            document.getElementById('info').textContent = '🔴 ¿Ves el cubo rojo girando? (Fondo rojo semi-transparente)';

            // ============================================================
            // REDIMENSIONAR
            // ============================================================
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
        }

        // Iniciar Three.js cuando el mapa esté listo
        map.on('load', function() {
            console.log('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        // También intentar después de 2 segundos por si el mapa ya estaba cargado
        setTimeout(() => {
            if (typeof map.loaded === 'function' && map.loaded()) {
                console.log('ℹ️ Mapa ya cargado, iniciando Three.js...');
                initThree();
            }
        }, 2000);

        console.log('✅ Prueba iniciada');
    </script>
</body>
</html>
