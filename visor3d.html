<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Semiesferas sobre cubo</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔴 Cubo rojo + Semiesferas encima</div>

    <script>
        console.log('🚀 INICIANDO...');

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;

        function initThree() {
            if (threeReady) return;
            console.log('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 10000000);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            console.log('✅ Three.js listo');

            // Crear objetos
            createObjects();

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            animate();
        }

        // ============================================================
        // CONVERTIR COORDENADAS (SIMPLE)
        // ============================================================
        function latLonToPosition(lng, lat) {
            const scale = 111320;
            const centerLng = 32.0;
            const centerLat = 48.5;
            return {
                x: (lng - centerLng) * scale * Math.cos(centerLat * Math.PI / 180),
                y: (lat - centerLat) * scale,
                z: 0
            };
        }

        // ============================================================
        // SINCRONIZAR CÁMARA
        // ============================================================
        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                const center = map.getCenter();
                const zoom = map.getZoom();
                const pitch = map.getPitch();
                const bearing = map.getBearing();

                const centerPos = latLonToPosition(center.lng, center.lat);

                const canvas = map.getCanvas();
                const height = canvas.height;
                const fov = camera.fov * Math.PI / 180;
                const metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom);
                const cameraHeight = (height / 2) / Math.tan(fov / 2) * metersPerPixel;

                const pitchRad = pitch * Math.PI / 180;
                const bearingRad = -bearing * Math.PI / 180;

                const hDist = cameraHeight * Math.sin(pitchRad);
                const vDist = cameraHeight * Math.cos(pitchRad);

                const offsetX = hDist * Math.sin(bearingRad);
                const offsetY = hDist * Math.cos(bearingRad);
                const offsetZ = vDist;

                camera.position.set(
                    centerPos.x + offsetX,
                    centerPos.y + offsetY,
                    offsetZ
                );

                camera.lookAt(centerPos.x, centerPos.y, 0);
                camera.updateProjectionMatrix();

                const dist = Math.sqrt(offsetX * offsetX + offsetY * offsetY + offsetZ * offsetZ);
                camera.near = Math.max(0.1, dist * 0.0001);
                camera.far = Math.max(100000, dist * 20);
                camera.updateProjectionMatrix();

            } catch (e) {
                console.warn('Error sync:', e);
            }
        }

        // ============================================================
        // CREAR OBJETOS
        // ============================================================
        function createObjects() {
            // Obtener el centro del mapa
            const center = map.getCenter();
            const pos = latLonToPosition(center.lng, center.lat);
            
            console.log(`📍 Centro en: (${pos.x.toFixed(0)}, ${pos.y.toFixed(0)})`);

            // ============================================================
            // 1. CUBO ROJO (referencia)
            // ============================================================
            const cubeGeom = new THREE.BoxGeometry(2000, 2000, 2000);
            const cubeMat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 1.0
            });
            const cube = new THREE.Mesh(cubeGeom, cubeMat);
            cube.position.set(pos.x, pos.y, 1000);
            scene.add(cube);
            console.log('🔴 Cubo rojo creado');

            // ============================================================
            // 2. SEMIESFERA NARANJA (encima del cubo)
            // ============================================================
            const radius = 800;
            
            // Semiesfera
            const sphereGeom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat = new THREE.MeshPhongMaterial({
                color: 0xff6600,
                emissive: 0xff3300,
                emissiveIntensity: 1.0,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(sphereGeom, sphereMat);
            sphere.position.set(pos.x + 3000, pos.y, radius * 0.9);
            scene.add(sphere);
            console.log('🟠 Semiesfera naranja creada');

            // Glow de la semiesfera
            const glowGeom = new THREE.SphereGeometry(radius * 2, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xff4400,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            scene.add(glow);

            // ============================================================
            // 3. SEMIESFERA VERDE (otra)
            // ============================================================
            const sphereGeom2 = new THREE.SphereGeometry(radius * 0.7, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat2 = new THREE.MeshPhongMaterial({
                color: 0x00ff66,
                emissive: 0x00ff33,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const sphere2 = new THREE.Mesh(sphereGeom2, sphereMat2);
            sphere2.position.set(pos.x - 3000, pos.y + 2000, radius * 0.7);
            scene.add(sphere2);

            // ============================================================
            // 4. SEMIESFERA AZUL (otra)
            // ============================================================
            const sphereGeom3 = new THREE.SphereGeometry(radius * 0.5, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat3 = new THREE.MeshPhongMaterial({
                color: 0x0066ff,
                emissive: 0x0033ff,
                emissiveIntensity: 0.6,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const sphere3 = new THREE.Mesh(sphereGeom3, sphereMat3);
            sphere3.position.set(pos.x + 2000, pos.y - 3000, radius * 0.5);
            scene.add(sphere3);

            console.log('✅ 4 semiesferas + cubo creados');
        }

        // ============================================================
        // ANIMACIÓN
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            // Rotar todos los objetos (excepto el cubo)
            const objects = scene.children;
            objects.forEach((obj, i) => {
                if (i === 0) return; // El cubo no rota
                if (obj.isMesh) {
                    obj.rotation.y += 0.01;
                }
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            console.log('🗺️ Mapa cargado');
            
            // Centrar en Ucrania
            map.flyTo({
                center: [32.0, 48.5],
                zoom: 6,
                pitch: 60,
                duration: 1000
            });

            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            console.log('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                console.log('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        console.log('🚀 Visor iniciado');
    </script>
</body>
</html>
