<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Visor 3D - Cesium</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0d1117; }
        #cesium-container { width: 100vw; height: 100vh; position: relative; }
        .cesium-viewer-bottom { display: none !important; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-width: 350px;
            max-height: 300px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <div id="cesium-container"></div>
    <div id="info">🌍 Visor 3D - Semiesferas con Cesium</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO CESIUM...');

        // ============================================================
        // 1. CESIUM - SIN TOKEN, CON OSM
        // ============================================================
        Cesium.Ion.defaultAccessToken = undefined;

        const viewer = new Cesium.Viewer('cesium-container', {
            imageryProvider: new Cesium.UrlTemplateImageryProvider({
                url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                subdomains: ['a', 'b', 'c'],
                credit: '© OpenStreetMap'
            }),
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            vrButton: false,
            backgroundColor: new Cesium.Color(0.08, 0.1, 0.15, 1.0)
        });

        // Cámara - Ucrania
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 600000),
            orientation: {
                pitch: Cesium.Math.toRadians(-40),
                heading: Cesium.Math.toRadians(0),
                roll: 0
            }
        });

        viewer.scene.requestRender();
        logDebug('✅ Cesium listo');

        // ============================================================
        // 2. FUNCIONES
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // 3. CREAR SEMIESFERA 3D CON CESIUM
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const t = Math.min(frp / 500, 1);
            const radius = 2000 + t * 8000; // 2km a 10km

            const r = 1.0;
            const g = 1.0 - t * 0.8;
            const b = 0.3 - t * 0.25;

            const position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);

            // ============================================================
            // SEMIESFERA PRINCIPAL
            // ============================================================
            const sphere = viewer.entities.add({
                position: position,
                ellipsoid: {
                    radii: new Cesium.Cartesian3(radius, radius, radius),
                    material: new Cesium.Color(r, g, b, 0.7),
                    emissiveColor: new Cesium.Color(r * 0.8, g * 0.5, b * 0.3, 0.8),
                    outline: false,
                    slicePart: 0.5
                }
            });

            // ============================================================
            // GLOW (círculo en el suelo)
            // ============================================================
            const glow = viewer.entities.add({
                position: position,
                ellipse: {
                    semiMinorAxis: radius * 3,
                    semiMajorAxis: radius * 3,
                    material: new Cesium.Color(r, g * 0.4, b * 0.2, 0.12),
                    outline: false,
                    height: 10
                }
            });

            // ============================================================
            // NÚCLEO BRILLANTE
            // ============================================================
            const core = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(lon, lat, radius * 0.3),
                ellipsoid: {
                    radii: new Cesium.Cartesian3(radius * 0.25, radius * 0.25, radius * 0.25),
                    material: new Cesium.Color(1.0, Math.min(g + 0.3, 1.0), Math.min(b + 0.3, 1.0), 0.9),
                    outline: false
                }
            });

            logDebug(`🔥 Fuego en (${lon.toFixed(2)}, ${lat.toFixed(2)}) radio: ${(radius/1000).toFixed(1)}km`);
            return { sphere, glow, core };
        }

        // ============================================================
        // 4. CARGAR INCENDIOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';
        let fireEntities = [];

        function loadFires() {
            logDebug('📡 Cargando incendios...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    const features = data.features || [];
                    logDebug(`✅ ${features.length} incendios cargados`);
                    createFires(features);
                })
                .catch(e => {
                    logDebug('❌ Error: ' + e.message);
                    createTestFires();
                });
        }

        function createFires(features) {
            // Limpiar anteriores
            fireEntities.forEach(entity => {
                viewer.entities.remove(entity);
            });
            fireEntities = [];

            const toRender = features.slice(0, 50);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const entities = createFireSphere(lon, lat, frp);
                    fireEntities.push(entities.sphere);
                    fireEntities.push(entities.glow);
                    fireEntities.push(entities.core);
                } catch (e) {
                    logDebug('❌ Error creando: ' + e.message);
                }
            });

            logDebug(`✅ ${fireEntities.length / 3} semiesferas creadas`);
            document.getElementById('info').textContent = `🔥 ${fireEntities.length / 3} semiesferas 3D en Ucrania`;
        }

        function createTestFires() {
            logDebug('🔥 Usando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100],
                [30.8, 50.6, 250],
                [30.2, 50.3, 180]
            ];

            testFires.forEach(([lon, lat, frp]) => {
                const entities = createFireSphere(lon, lat, frp);
                fireEntities.push(entities.sphere);
                fireEntities.push(entities.glow);
                fireEntities.push(entities.core);
            });

            logDebug(`✅ ${fireEntities.length / 3} semiesferas de prueba`);
            document.getElementById('info').textContent = `🔥 ${fireEntities.length / 3} semiesferas de prueba en Kyiv`;
        }

        // ============================================================
        // 5. INICIAR
        // ============================================================
        setTimeout(() => {
            loadFires();
        }, 1500);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
