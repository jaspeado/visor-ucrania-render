<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Visor Ucrania 3D</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #cesium-container { width: 100vw; height: 100vh; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; border: 1px solid #0f0; }
        .cesium-viewer-bottom { display: none !important; }
        #debug { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.9); color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-width: 350px; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>

    <div id="cesium-container"></div>
    <div id="info">🔥 Visor 3D - Ucrania</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO CESIUM...');

        // ============================================================
        // CESIUM - CON MAPA DE FONDO
        // ============================================================
        Cesium.Ion.defaultAccessToken = undefined;

        const viewer = new Cesium.Viewer('cesium-container', {
            imageryProvider: new Cesium.UrlTemplateImageryProvider({
                url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                subdomains: ['a', 'b', 'c'],
                credit: '© CartoDB'
            }),
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            vrButton: false,
            backgroundColor: new Cesium.Color(0.05, 0.05, 0.08, 1.0)
        });

        // Cámara - Ucrania
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 300000),
            orientation: {
                pitch: Cesium.Math.toRadians(-45),
                heading: Cesium.Math.toRadians(0),
                roll: 0
            }
        });

        viewer.scene.requestRender();
        logDebug('✅ Cesium listo');

        // ============================================================
        // DATOS DE PRUEBA (SIEMPRE VISIBLES)
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const t = Math.min(frp / 500, 1);
            const radius = 2000 + t * 6000;

            const r = 1.0;
            const g = 1.0 - t * 0.8;
            const b = 0.3 - t * 0.25;

            const position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);

            // Semiesfera (mitad superior)
            const sphere = viewer.entities.add({
                position: position,
                ellipsoid: {
                    radii: new Cesium.Cartesian3(radius, radius, radius),
                    material: new Cesium.Color(r, g, b, 0.7),
                    emissiveColor: new Cesium.Color(r, g * 0.5, b * 0.2, 0.8),
                    outline: false,
                    slicePart: 0.5
                }
            });

            // Glow en el suelo
            const glow = viewer.entities.add({
                position: position,
                ellipse: {
                    semiMinorAxis: radius * 2.5,
                    semiMajorAxis: radius * 2.5,
                    material: new Cesium.Color(r, g * 0.3, b * 0.15, 0.12),
                    outline: false,
                    height: 10
                }
            });

            // Núcleo
            const core = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(lon, lat, radius * 0.3),
                ellipsoid: {
                    radii: new Cesium.Cartesian3(radius * 0.2, radius * 0.2, radius * 0.2),
                    material: new Cesium.Color(1.0, Math.min(g + 0.3, 1.0), Math.min(b + 0.3, 1.0), 0.9),
                    outline: false
                }
            });

            logDebug(`🔥 Fuego en (${lon.toFixed(2)}, ${lat.toFixed(2)}) - ${(radius/1000).toFixed(1)}km`);

            return { sphere, glow, core };
        }

        // ============================================================
        // DATOS DE PRUEBA EN KYIV
        // ============================================================
        const testFires = [
            [30.5234, 50.4501, 400],
            [30.6, 50.5, 300],
            [30.4, 50.4, 200],
            [30.7, 50.3, 150],
            [30.3, 50.6, 100],
            [30.8, 50.6, 250],
            [30.2, 50.3, 180]
        ];

        let entities = [];

        testFires.forEach(([lon, lat, frp]) => {
            const e = createFireSphere(lon, lat, frp);
            entities.push(e.sphere);
            entities.push(e.glow);
            entities.push(e.core);
        });

        logDebug(`✅ ${entities.length / 3} semiesferas creadas en Kyiv`);
        document.getElementById('info').textContent = `🔥 ${entities.length / 3} semiesferas en Kyiv`;

        // ============================================================
        // INTENTAR CARGAR DATOS REALES (OPCIONAL)
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';

        function loadRealData() {
            logDebug('📡 Cargando datos reales...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    const features = data.features || [];
                    logDebug(`✅ ${features.length} incendios reales`);

                    // Solo añadir 20 más
                    const toAdd = features.slice(0, 20);
                    toAdd.forEach(f => {
                        try {
                            const frp = f.properties?.frp || 10;
                            const coords = f.geometry.coordinates;
                            const ring = coords[0] || coords;
                            let lon = 0, lat = 0;
                            const count = ring.length;
                            for (let i = 0; i < count; i++) {
                                lon += ring[i][0];
                                lat += ring[i][1];
                            }
                            lon /= count;
                            lat /= count;

                            const e = createFireSphere(lon, lat, frp);
                            entities.push(e.sphere);
                            entities.push(e.glow);
                            entities.push(e.core);
                        } catch (e) {}
                    });

                    logDebug(`✅ Total: ${entities.length / 3} semiesferas`);
                    document.getElementById('info').textContent = `🔥 ${entities.length / 3} semiesferas en Ucrania`;
                })
                .catch(e => logDebug('❌ Error cargando datos reales: ' + e.message));
        }

        // Descomentar para cargar datos reales
        // setTimeout(loadRealData, 3000);

        logDebug('🚀 Visor listo');
    </script>
</body>
</html>
