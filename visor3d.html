<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Visor Ucrania 3D - Semiesferas</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0d1117; }
        #cesium-container { width: 100vw; height: 100vh; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>

    <div id="cesium-container"></div>
    <div id="info">🔥 Semiesferas 3D - Ucrania</div>

    <script>
        console.log('🚀 INICIANDO...');

        Cesium.Ion.defaultAccessToken = undefined;

        const viewer = new Cesium.Viewer('cesium-container', {
            imageryProvider: new Cesium.UrlTemplateImageryProvider({
                url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                subdomains: ['a', 'b', 'c']
            }),
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            animation: false, timeline: false, infoBox: false,
            selectionIndicator: false, baseLayerPicker: false, geocoder: false,
            homeButton: false, sceneModePicker: false, navigationHelpButton: false,
            fullscreenButton: false, vrButton: false
        });

        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 400000),
            orientation: { pitch: Cesium.Math.toRadians(-40) }
        });

        // ============================================================
        // CREAR SEMIESFERA - ORIENTACIÓN CORRECTA (90°)
        // ============================================================
        function createHemisphere(lon, lat, radius, color) {
            const position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);
            
            // Generar semiesfera: Y hacia arriba, base en Y=0
            const positions = [];
            const indices = [];
            const normals = [];
            
            const segments = 32;
            const rings = 16;
            
            // Vértice superior (polo)
            positions.push(0, radius, 0);
            normals.push(0, 1, 0);
            
            // Anillos
            for (let ring = 1; ring <= rings; ring++) {
                const phi = (ring / rings) * Math.PI / 2;
                const y = radius * Math.cos(phi);
                const r = radius * Math.sin(phi);
                
                for (let i = 0; i < segments; i++) {
                    const theta = (i / segments) * Math.PI * 2;
                    const x = r * Math.cos(theta);
                    const z = r * Math.sin(theta);
                    
                    positions.push(x, y, z);
                    const len = Math.sqrt(x*x + y*y + z*z);
                    normals.push(x/len, y/len, z/len);
                }
            }
            
            // Índices
            for (let ring = 0; ring < rings - 1; ring++) {
                const ringStart = ring * segments + 1;
                const nextRingStart = (ring + 1) * segments + 1;
                for (let i = 0; i < segments; i++) {
                    const a = ringStart + i;
                    const b = ringStart + (i + 1) % segments;
                    const c = nextRingStart + i;
                    const d = nextRingStart + (i + 1) % segments;
                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }
            
            const lastRingStart = (rings - 1) * segments + 1;
            for (let i = 0; i < segments; i++) {
                const a = lastRingStart + i;
                const b = lastRingStart + (i + 1) % segments;
                indices.push(0, b, a);
            }
            
            const geometry = new Cesium.Geometry({
                attributes: {
                    position: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.DOUBLE,
                        componentsPerAttribute: 3,
                        values: new Float64Array(positions)
                    }),
                    normal: new Cesium.GeometryAttribute({
                        componentDatatype: Cesium.ComponentDatatype.FLOAT,
                        componentsPerAttribute: 3,
                        values: new Float32Array(normals)
                    })
                },
                indices: indices,
                primitiveType: Cesium.PrimitiveType.TRIANGLES,
                boundingSphere: Cesium.BoundingSphere.fromVertices(positions)
            });
            
            // ============================================================
            // MATRIZ DE TRANSFORMACIÓN CON ROTACIÓN DE 90°
            // Para que la semiesfera apunte hacia ARRIBA (Z en Cesium)
            // ============================================================
            const modelMatrix = Cesium.Transforms.eastNorthUpToFixedFrame(position);
            
            // Rotación de 90° alrededor del eje X para que Y→Z
            const rotationMatrix = new Cesium.Matrix3.fromRotationX(Cesium.Math.PI / 2);
            const rotation4 = Cesium.Matrix4.fromRotationTranslation(rotationMatrix);
            
            const finalMatrix = Cesium.Matrix4.multiply(
                modelMatrix,
                rotation4,
                new Cesium.Matrix4()
            );
            
            const instance = new Cesium.GeometryInstance({
                geometry: geometry,
                modelMatrix: finalMatrix,
                attributes: {
                    color: Cesium.ColorGeometryInstanceAttribute.fromColor(color)
                }
            });
            
            const primitive = new Cesium.Primitive({
                geometryInstances: instance,
                appearance: new Cesium.PerInstanceColorAppearance({
                    translucent: true,
                    closed: false,
                    flat: false
                })
            });
            
            viewer.scene.primitives.add(primitive);
            return primitive;
        }

        // ============================================================
        // DATOS DE PRUEBA
        // ============================================================
        const testData = [
            [30.5234, 50.4501, 5000, 400],
            [30.6, 50.5, 4000, 300],
            [30.4, 50.4, 3000, 200],
            [30.7, 50.3, 2500, 150],
            [30.3, 50.6, 2000, 100],
            [30.8, 50.6, 3500, 250],
            [30.2, 50.3, 2200, 180]
        ];

        testData.forEach(([lon, lat, radius, frp]) => {
            const t = Math.min(frp / 500, 1);
            const color = new Cesium.Color(
                1.0,
                1.0 - t * 0.8,
                0.3 - t * 0.25,
                0.8
            );
            
            createHemisphere(lon, lat, radius, color);
            
            // Glow en el suelo
            viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
                ellipse: {
                    semiMinorAxis: radius * 2.5,
                    semiMajorAxis: radius * 2.5,
                    material: new Cesium.Color(
                        1.0,
                        (1.0 - t * 0.8) * 0.4,
                        (0.3 - t * 0.25) * 0.2,
                        0.15
                    ),
                    outline: false,
                    height: 10
                }
            });
        });

        console.log('✅ Semiesferas 3D orientadas correctamente');
    </script>
</body>
</html>
