<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Ucrania 3D - CORREGIDO</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
        #debug { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.9); color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-width: 350px; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🌍 Visor 3D - Incendios</div>
    <div id="debug">Cargando...</div>

    <script>
        console.log('🚀 INICIANDO...');
        const debugEl = document.getElementById('debug');

        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;
        let fireMeshes = [];
        let firesData = [];

        function initThree() {
            if (threeReady) return;
            logDebug('🔄 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 10000000);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            // Cargar datos de incendios
            loadFires();

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            animate();
        }

        // ============================================================
        // FUNCIÓN CORRECTA PARA CONVERTIR COORDENADAS
        // ============================================================
        function lngLatToMeters(lng, lat) {
            // Usar la proyección de MapLibre directamente
            const mercator = maplibregl.MercatorCoordinate.fromLngLat(
                new maplibregl.LngLat(lng, lat)
            );
            return {
                x: mercator.x * 10000000, // Escalar para que sea visible
                y: mercator.y * 10000000,
                z: 0
            };
        }

        // ============================================================
        // SINCRONIZAR CÁMARA
        // ============================================================
        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                const center = map.getCenter();
                const zoom = map.getZoom();
                const pitch = map.getPitch();
                const bearing = map.getBearing();

                const centerMeters = lngLatToMeters(center.lng, center.lat);

                const canvas = map.getCanvas();
                const height = canvas.height;
                const fov = camera.fov * Math.PI / 180;
                const metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom);
                const cameraHeight = (height / 2) / Math.tan(fov / 2) * metersPerPixel;

                const pitchRad = pitch * Math.PI / 180;
                const bearingRad = -bearing * Math.PI / 180;

                const hDist = cameraHeight * Math.sin(pitchRad);
                const vDist = cameraHeight * Math.cos(pitchRad);

                const offsetX = hDist * Math.sin(bearingRad);
                const offsetY = hDist * Math.cos(bearingRad);
                const offsetZ = vDist;

                camera.position.set(
                    centerMeters.x + offsetX,
                    centerMeters.y + offsetY,
                    offsetZ
                );

                camera.lookAt(centerMeters.x, centerMeters.y, 0);
                camera.updateProjectionMatrix();

                const dist = Math.sqrt(offsetX * offsetX + offsetY * offsetY + offsetZ * offsetZ);
                camera.near = Math.max(0.1, dist * 0.0001);
                camera.far = Math.max(100000, dist * 20);
                camera.updateProjectionMatrix();

            } catch (e) {
                logDebug('❌ Error sync: ' + e.message);
            }
        }

        // ============================================================
        // CREAR SEMIESFERA DE INCENDIO
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const pos = lngLatToMeters(lon, lat);
            
            // Tamaño proporcional al FRP
            const t = Math.min(frp / 500, 1);
            const radius = 100 + t * 500;

            // Color: amarillo → naranja → rojo
            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();

            // Semiesfera principal
            const geom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 0.6 + t * 0.8,
                transparent: true,
                opacity: 0.6 + t * 0.3,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 30
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(pos.x, pos.y, radius * 0.85);
            group.add(sphere);

            // Glow exterior
            const glowGeom = new THREE.SphereGeometry(radius * 2.5, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.4)}, ${Math.round(b * 0.2)})`),
                transparent: true,
                opacity: 0.1 + t * 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            group.add(glow);

            // Núcleo brillante
            const coreGeom = new THREE.SphereGeometry(radius * 0.4, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.6 + t * 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.copy(sphere.position);
            core.position.y += radius * 0.2;
            group.add(core);

            // Anillo base
            const ringGeom = new THREE.RingGeometry(radius * 0.5, radius * 0.8, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.7)}, ${Math.round(b * 0.4)})`),
                transparent: true,
                opacity: 0.2 + t * 0.2,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const ring = new THREE.Mesh(ringGeom, ringMat);
            ring.position.copy(sphere.position);
            ring.position.y += 1;
            ring.rotation.x = -Math.PI / 2;
            group.add(ring);

            group.userData = { frp, lon, lat, radius, pos };

            // LOG para verificar posición
            logDebug(`📍 Fuego en (${lon}, ${lat}) → metros (${pos.x.toFixed(0)}, ${pos.y.toFixed(0)})`);

            return group;
        }

        // ============================================================
        // CARGAR INCENDIOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';

        function loadFires() {
            logDebug('📡 Cargando incendios...');
            
            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    firesData = data.features || [];
                    logDebug(`✅ ${firesData.length} incendios cargados`);
                    
                    // Crear semiesferas
                    createFires();
                })
                .catch(e => {
                    logDebug('❌ Error cargando: ' + e.message);
                    // Crear una de prueba si falla
                    createTestFire();
                });
        }

        function createFires() {
            // Limpiar anteriores
            fireMeshes.forEach(obj => {
                scene.remove(obj);
                obj.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            fireMeshes = [];

            if (firesData.length === 0) {
                logDebug('⚠️ No hay datos, creando prueba...');
                createTestFire();
                return;
            }

            // Tomar los primeros 100
            const toRender = firesData.slice(0, 100);
            logDebug(`🔥 Creando ${toRender.length} semiesferas...`);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const lon = coords[0];
                    const lat = coords[1];

                    const group = createFireSphere(lon, lat, frp);
                    scene.add(group);
                    fireMeshes.push(group);
                } catch (e) {
                    logDebug('❌ Error: ' + e.message);
                }
            });

            logDebug(`✅ ${fireMeshes.length} semiesferas creadas`);
            
            // Verificar posición de la primera
            if (fireMeshes.length > 0) {
                const pos = fireMeshes[0].position;
                logDebug(`📍 Primera semiesfera en: (${pos.x.toFixed(0)}, ${pos.y.toFixed(0)})`);
            }
        }

        // ============================================================
        // CREAR INCENDIO DE PRUEBA (si falla la carga)
        // ============================================================
        function createTestFire() {
            logDebug('🔥 Creando incendio de prueba en Kyiv...');
            
            // Kyiv: 30.5234, 50.4501
            const group = createFireSphere(30.5234, 50.4501, 300);
            scene.add(group);
            fireMeshes.push(group);
            
            logDebug('✅ Incendio de prueba creado');
        }

        // ============================================================
        // ANIMACIÓN
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            const time = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                const speed = 0.1 + (group.userData?.frp || 100) / 500 * 0.3;
                group.rotation.y += 0.003 * speed;

                const pulse = Math.sin(time * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            logDebug('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                logDebug('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
