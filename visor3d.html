<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Prueba DeepState</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            max-width: 400px;
            max-height: 200px;
            overflow: auto;
            pointer-events: none;
        }
        #info.error { color: #f00; }
    </style>
</head>
<body>
    <div id="info">🐛 Esperando datos...</div>
    <div id="map"></div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';
        const infoEl = document.getElementById('info');

        function log(msg, isError = false) {
            infoEl.textContent = msg + '\n' + infoEl.textContent;
            infoEl.textContent = infoEl.textContent.split('\n').slice(0, 15).join('\n');
            if (isError) infoEl.className = 'error';
            console.log(msg);
        }

        // ============================================================
        // INICIALIZAR MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {},
                layers: []
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 0
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // 1. MAPA BASE (OpenStreetMap)
        // ============================================================
        map.on('load', function() {
            log('✅ Mapa cargado');

            // Añadir OSM como fondo
            map.addSource('osm', {
                type: 'raster',
                tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                tileSize: 256
            });
            map.addLayer({
                id: 'osm-layer',
                type: 'raster',
                source: 'osm'
            });

            // ============================================================
            // 2. CARGAR DEEPSTATE
            // ============================================================
            log('📡 Cargando DeepState...');
            
            // Cargar pako
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
            script.onload = function() {
                log('✅ pako cargado');
                
                fetch(DEEPSTATE_URL)
                    .then(r => {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.arrayBuffer();
                    })
                    .then(buffer => {
                        log('📦 Descargado: ' + (buffer.byteLength / 1024).toFixed(1) + ' KB');
                        
                        // Descomprimir
                        const data = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                        const geojson = JSON.parse(data);
                        const features = geojson.features || [];
                        log('✅ DeepState: ' + features.length + ' polígonos');
                        
                        // Extraer fechas
                        const fechas = new Set();
                        features.forEach(f => {
                            const d = f.properties?.date || '';
                            if (d) fechas.add(d);
                        });
                        const fechasOrdenadas = Array.from(fechas).sort();
                        const ultimaFecha = fechasOrdenadas[fechesOrdenadas.length - 1] || '';
                        log('📅 Última fecha: ' + ultimaFecha);
                        
                        // ============================================================
                        // 3. FILTRAR POR LA FECHA MÁS RECIENTE
                        // ============================================================
                        const filteredFeatures = features.filter(f =>
                            (f.properties?.date || '') === ultimaFecha
                        );
                        log('📊 Polígonos para ' + ultimaFecha + ': ' + filteredFeatures.length);
                        
                        if (filteredFeatures.length === 0) {
                            log('❌ No hay polígonos para esta fecha', true);
                            return;
                        }
                        
                        // Verificar el primer polígono
                        const first = filteredFeatures[0];
                        log('🔍 Primer polígono: ' + JSON.stringify(first.properties).substring(0, 80));
                        
                        // ============================================================
                        // 4. AÑADIR AL MAPA
                        // ============================================================
                        try {
                            map.addSource('deepstate', {
                                type: 'geojson',
                                data: {
                                    type: 'FeatureCollection',
                                    features: filteredFeatures
                                }
                            });
                            log('✅ Fuente DeepState añadida');
                            
                            // Capa de relleno ROJO OPACO
                            map.addLayer({
                                id: 'deepstate-fill',
                                type: 'fill',
                                source: 'deepstate',
                                paint: {
                                    'fill-color': '#FF0000',
                                    'fill-opacity': 0.7,
                                    'fill-outline-color': '#FFFFFF',
                                    'fill-outline-width': 1
                                }
                            });
                            log('✅ Capa de relleno añadida (rojo 70%)');
                            
                            // Capa de borde
                            map.addLayer({
                                id: 'deepstate-line',
                                type: 'line',
                                source: 'deepstate',
                                paint: {
                                    'line-color': '#FFFFFF',
                                    'line-width': 2,
                                    'line-opacity': 1.0
                                }
                            });
                            log('✅ Capa de borde añadida (blanco)');
                            
                            // Mover la capa de DeepState por encima de OSM
                            map.moveLayer('deepstate-fill', 'osm-layer');
                            map.moveLayer('deepstate-line', 'osm-layer');
                            
                            log('✅ DeepState dibujado correctamente');
                            log('🎉 Si ves un polígono rojo, funciona!');
                        } catch (e) {
                            log('❌ Error al añadir capa: ' + e.message, true);
                        }
                    })
                    .catch(e => {
                        log('❌ Error: ' + e.message, true);
                    });
            };
            document.head.appendChild(script);
        });
    </script>
</body>
</html>
