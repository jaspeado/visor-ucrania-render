<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Ucrania 3D</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #panel {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            background: rgba(13, 17, 23, 0.92);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px 16px;
            min-width: 200px;
            max-width: 220px;
            font-size: 12px;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
        }
        .control-group {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #21262d;
        }
        .control-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .control-group label {
            display: block;
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .control-group input[type="range"] {
            width: 100%;
            margin: 4px 0;
            accent-color: #58a6ff;
            background: #30363d;
            height: 3px;
            border-radius: 2px;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 2px 0;
        }
        .checkbox-group input[type="checkbox"] {
            accent-color: #58a6ff;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        .checkbox-group label {
            text-transform: none !important;
            font-size: 11px !important;
            color: #e6edf3 !important;
            font-weight: 400 !important;
            margin-bottom: 0 !important;
        }
        .slider-value {
            float: right;
            font-size: 10px;
            color: #58a6ff;
            font-weight: 500;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #8b949e;
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid #21262d;
            font-weight: 500;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(13, 17, 23, 0.85);
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 11px;
            pointer-events: none;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

    <div id="panel">
        <div style="margin-bottom:10px; font-weight:600; color:#58a6ff; font-size:11px;">⚙️ Controles</div>
        <div class="control-group">
            <div class="checkbox-group">
                <input type="checkbox" id="chk-fires" checked>
                <label for="chk-fires">🔥 Incendios</label>
            </div>
            <label>FRP mínimo <span class="slider-value" id="val-frp">10</span></label>
            <input type="range" id="frp-slider" min="0" max="100" value="10">
        </div>
        <div class="stats-row">
            <span id="stats-fires">🔥 0</span>
        </div>
    </div>

    <div id="info">🌍 Visor 3D Ucrania · Semiesferas 3D</div>
    <div id="map">
        <div id="three-container"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';
        
        let firesData = [];
        let currentFires = [];
        let fireMeshes = [];
        let scene, camera, renderer;
        let threeReady = false;
        let isUpdating = false;

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // THREE.JS
        // ============================================================
        function initThree() {
            if (threeReady) return;
            console.log('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.01, 1000);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            console.log('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            // Cargar incendios
            loadFires();
            
            animate(0);
        }

        // ============================================================
        // CALCULAR CENTROIDE DE POLÍGONO
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // SINCRONIZAR CÁMARA - CORREGIDA
        // ============================================================
        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                const center = map.getCenter();
                const zoom = map.getZoom();
                const pitch = map.getPitch();
                const bearing = map.getBearing();

                // Obtener centro en coordenadas Mercator
                const centerMercator = maplibregl.MercatorCoordinate.fromLngLat(
                    new maplibregl.LngLat(center.lng, center.lat)
                );

                // Calcular distancia de la cámara al centro
                const canvas = map.getCanvas();
                const height = canvas.height;
                const halfFov = camera.fov * Math.PI / 360;
                const pixelsPerMeter = 1 / (Math.pow(2, zoom) * 256);
                const cameraToCenterDistance = (height / 2) / Math.tan(halfFov) / pixelsPerMeter;

                // Aplicar pitch y bearing
                const pitchRad = pitch * Math.PI / 180;
                const bearingRad = -bearing * Math.PI / 180;

                const xOffset = cameraToCenterDistance * Math.sin(pitchRad) * Math.sin(bearingRad);
                const yOffset = cameraToCenterDistance * Math.sin(pitchRad) * Math.cos(bearingRad);
                const zOffset = cameraToCenterDistance * Math.cos(pitchRad);

                // Posicionar cámara
                camera.position.set(
                    centerMercator.x + xOffset,
                    centerMercator.y + yOffset,
                    centerMercator.z + zOffset
                );

                // Mirar al centro
                camera.lookAt(
                    centerMercator.x,
                    centerMercator.y,
                    centerMercator.z
                );
                
                camera.updateProjectionMatrix();

            } catch (e) {
                // Silencioso
            }
        }

        // ============================================================
        // CREAR SEMIESFERA - CORREGIDA
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const mercator = maplibregl.MercatorCoordinate.fromLngLat(
                new maplibregl.LngLat(lon, lat)
            );
            
            const t = Math.min(frp / 500, 1);
            const radius = 0.0001 + t * 0.0008;

            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();

            // Semiesfera
            const geom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 0.6 + t * 0.8,
                transparent: true,
                opacity: 0.8 + t * 0.2,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 30
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(mercator.x, mercator.y, mercator.z + radius * 0.8);
            group.add(sphere);

            // Glow
            const glowGeom = new THREE.SphereGeometry(radius * 2.5, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.4)}, ${Math.round(b * 0.2)})`),
                transparent: true,
                opacity: 0.1 + t * 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            group.add(glow);

            // Núcleo
            const coreGeom = new THREE.SphereGeometry(radius * 0.4, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.6 + t * 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.copy(sphere.position);
            core.position.y += radius * 0.2;
            group.add(core);

            group.userData = { frp, lon, lat, radius };

            return group;
        }

        // ============================================================
        // ACTUALIZAR INCENDIOS
        // ============================================================
        function updateFires() {
            if (isUpdating) return;
            isUpdating = true;

            const enabled = document.getElementById('chk-fires').checked;
            const frpMin = parseInt(document.getElementById('frp-slider').value) || 0;

            // Limpiar objetos antiguos
            fireMeshes.forEach(obj => {
                scene.remove(obj);
                obj.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            fireMeshes = [];

            if (!enabled || firesData.length === 0) {
                document.getElementById('stats-fires').textContent = '🔥 0';
                isUpdating = false;
                return;
            }

            const filtered = firesData.filter(f => {
                const frp = f.properties?.frp || 0;
                return frp >= frpMin;
            });

            currentFires = filtered;
            document.getElementById('stats-fires').textContent = '🔥 ' + filtered.length;

            const toRender = filtered.slice(0, 200);
            console.log(`🔥 Renderizando ${toRender.length} incendios`);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const group = createFireSphere(lon, lat, frp);
                    scene.add(group);
                    fireMeshes.push(group);
                } catch (e) {
                    console.warn('Error:', e);
                }
            });

            isUpdating = false;
        }

        // ============================================================
        // CARGAR INCENDIOS
        // ============================================================
        function loadFires() {
            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    firesData = data.features || [];
                    console.log(`✅ FIRMS cargado (${firesData.length} incendios)`);
                    updateFires();
                })
                .catch(e => console.error('Error:', e));
        }

        // ============================================================
        // ANIMACIÓN
        // ============================================================
        let lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            const delta = (time - lastTime) / 1000;
            lastTime = time;

            const timeNow = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                const speed = 0.1 + (group.userData.frp / 500) * 0.3;
                group.rotation.y += delta * speed * 0.5;

                const pulse = Math.sin(timeNow * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // CONTROLES
        // ============================================================
        document.getElementById('chk-fires').addEventListener('change', updateFires);
        document.getElementById('frp-slider').addEventListener('input', function() {
            document.getElementById('val-frp').textContent = this.value;
            updateFires();
        });

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            console.log('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            console.log('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        console.log('🚀 Visor iniciado');
    </script>
</body>
</html>
