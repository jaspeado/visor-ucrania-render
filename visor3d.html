<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Semiesferas</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0d1117; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🌍 Visor 3D - Semiesferas</div>

    <script>
        console.log('🚀 INICIANDO...');

        // ============================================================
        // 1. MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // 2. THREE.JS - USANDO LA MATRIZ DE PROYECCIÓN DE MAPLIBRE
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;
        let fireMeshes = [];
        let firesData = [];

        // ============================================================
        // 3. CONVERTIR COORDENADAS A METROS (MERCATOR)
        // ============================================================
        function lngLatToMeters(lng, lat) {
            const R = 6378137;
            const x = R * lng * Math.PI / 180;
            const y = R * Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
            return { x, y };
        }

        // ============================================================
        // 4. SINCRONIZAR CÁMARA - MÉTODO OFICIAL CON glMatrix
        // ============================================================
        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                // Obtener la matriz de proyección del mapa
                const transform = map.transform;
                const projMatrix = transform.glMatrix;
                
                if (!projMatrix) {
                    console.warn('⚠️ projMatrix no disponible aún');
                    return;
                }

                // Crear matriz de Three.js
                const m = new THREE.Matrix4().fromArray(projMatrix);
                
                // Invertir Y porque Three.js usa Y hacia arriba
                m.multiply(new THREE.Matrix4().makeScale(1, -1, 1));
                
                // Asignar a la cámara
                camera.projectionMatrix = m;
                camera.projectionMatrixInverse = new THREE.Matrix4().copy(m).invert();
                
                // Calcular posición de la cámara
                const camPos = new THREE.Vector3();
                const mInv = new THREE.Matrix4().copy(m).invert();
                camPos.set(0, 0, 0).applyMatrix4(mInv);
                camera.position.copy(camPos);
                
                camera.updateMatrixWorld(true);

            } catch (e) {
                console.warn('⚠️ Error sync:', e);
            }
        }

        // ============================================================
        // 5. THREE.JS SETUP
        // ============================================================
        function initThree() {
            if (threeReady) return;
            console.log('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            // Cámara básica (se sobreescribirá con syncCamera)
            camera = new THREE.Camera();
            camera.matrixAutoUpdate = false;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            console.log('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Primera sincronización
            setTimeout(() => {
                syncCamera();
            }, 100);

            // Cargar datos
            loadFires();

            // Iniciar animación
            animate(0);
        }

        // ============================================================
        // 6. CREAR SEMIESFERA 3D
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            // Usar coordenadas Mercator (0-1)
            const merc = maplibregl.MercatorCoordinate.fromLngLat(
                new maplibregl.LngLat(lon, lat)
            );
            
            // Posición en coordenadas del mapa
            const pos = {
                x: merc.x,
                y: merc.y,
                z: merc.z || 0
            };

            const t = Math.min(frp / 500, 1);
            const radius = 0.0001 + t * 0.0005;

            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();
            group.position.set(pos.x, pos.y, pos.z + radius * 0.5);

            // Semiesfera
            const geom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 0.8 + t * 1.0,
                transparent: true,
                opacity: 0.85 + t * 0.15,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(0, 0, radius * 0.5);
            group.add(sphere);

            // Glow
            const glowGeom = new THREE.SphereGeometry(radius * 3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.4)}, ${Math.round(b * 0.2)})`),
                transparent: true,
                opacity: 0.12 + t * 0.12,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.set(0, 0, radius * 0.5);
            group.add(glow);

            // Núcleo
            const coreGeom = new THREE.SphereGeometry(radius * 0.4, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.8 + t * 0.2,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.set(0, 0, radius * 0.5 + radius * 0.2);
            group.add(core);

            group.userData = { frp, lon, lat, radius, pos };

            return group;
        }

        // ============================================================
        // 7. CENTROIDE
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // 8. ACTUALIZAR INCENDIOS
        // ============================================================
        function updateFires() {
            if (!threeReady) return;

            console.log('🔄 Actualizando incendios...');

            fireMeshes.forEach(obj => {
                scene.remove(obj);
                obj.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            fireMeshes = [];

            if (firesData.length === 0) {
                console.log('⚠️ No hay datos');
                return;
            }

            const toRender = firesData.slice(0, 150);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const group = createFireSphere(lon, lat, frp);
                    scene.add(group);
                    fireMeshes.push(group);
                } catch (e) {
                    console.warn('Error:', e);
                }
            });

            console.log(`✅ ${fireMeshes.length} semiesferas creadas`);
        }

        // ============================================================
        // 9. CARGAR DATOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';

        function loadFires() {
            console.log('📡 Cargando incendios...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    firesData = data.features || [];
                    console.log(`✅ ${firesData.length} incendios`);
                    setTimeout(updateFires, 200);
                })
                .catch(e => {
                    console.log('❌ Error:', e.message);
                    createTestData();
                });
        }

        function createTestData() {
            console.log('🔥 Usando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100]
            ];
            firesData = testFires.map(([lon, lat, frp]) => ({
                properties: { frp },
                geometry: {
                    coordinates: [[[lon-0.02, lat-0.02], [lon+0.02, lat-0.02], [lon+0.02, lat+0.02], [lon-0.02, lat+0.02], [lon-0.02, lat-0.02]]]
                }
            }));
            setTimeout(updateFires, 200);
        }

        // ============================================================
        // 10. ANIMACIÓN
        // ============================================================
        let lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            const delta = lastTime ? (time - lastTime) / 1000 : 0;
            lastTime = time;

            const timeNow = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                group.rotation.y += delta * 0.2;

                const pulse = Math.sin(timeNow * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // 11. INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            console.log('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            console.log('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                console.log('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        console.log('🚀 Visor iniciado');
    </script>
</body>
</html>
