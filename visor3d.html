<!DOCTYPE html>
<html>
<head>
    <title>Prueba Semiesfera + Cubo</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔴 Cubo rojo + Semiesfera naranja</div>
    <div id="debug">Cargando...</div>

    <script>
        console.log('🚀 INICIANDO...');
        const debugEl = document.getElementById('debug');

        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 15) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 15).join('<br>');
            }
        }

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;

        function initThree() {
            if (threeReady) return;
            logDebug('🔄 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            // ESCENA
            scene = new THREE.Scene();

            // CÁMARA
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 10000000);

            // RENDERER
            renderer = new THREE.WebGLRenderer({
                alpha: true,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            // Crear objetos
            createObjects();

            // Iniciar animación
            animate();
        }

        // ============================================================
        // COORDENADAS
        // ============================================================
        function lngLatToMeters(lng, lat) {
            const R = 6378137;
            const x = R * lng * Math.PI / 180;
            const y = R * Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
            return { x, y };
        }

        // ============================================================
        // SINCRONIZAR CÁMARA
        // ============================================================
        let frameCount = 0;

        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                const center = map.getCenter();
                const zoom = map.getZoom();
                const pitch = map.getPitch();
                const bearing = map.getBearing();

                const centerMeters = lngLatToMeters(center.lng, center.lat);

                const canvas = map.getCanvas();
                const height = canvas.height;
                const fov = camera.fov * Math.PI / 180;
                const metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom);
                const cameraHeight = (height / 2) / Math.tan(fov / 2) * metersPerPixel;

                const pitchRad = pitch * Math.PI / 180;
                const bearingRad = -bearing * Math.PI / 180;

                const hDist = cameraHeight * Math.sin(pitchRad);
                const vDist = cameraHeight * Math.cos(pitchRad);

                const offsetX = hDist * Math.sin(bearingRad);
                const offsetY = hDist * Math.cos(bearingRad);
                const offsetZ = vDist;

                camera.position.set(
                    centerMeters.x + offsetX,
                    centerMeters.y + offsetY,
                    offsetZ
                );

                camera.lookAt(centerMeters.x, centerMeters.y, 0);
                camera.updateProjectionMatrix();

                // Ajustar clipping
                const dist = Math.sqrt(offsetX * offsetX + offsetY * offsetY + offsetZ * offsetZ);
                camera.near = Math.max(0.1, dist * 0.0001);
                camera.far = Math.max(100000, dist * 20);
                camera.updateProjectionMatrix();

                frameCount++;
                if (frameCount % 30 === 0) {
                    logDebug(`📍 Zoom: ${zoom.toFixed(2)} | Objetos: ${scene.children.length}`);
                }

            } catch (e) {
                logDebug('❌ Error syncCamera: ' + e.message);
            }
        }

        // ============================================================
        // CREAR OBJETOS (CUBO + SEMIESFERA)
        // ============================================================
        let objects = [];

        function createObjects() {
            // Limpiar objetos anteriores
            objects.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
            });
            objects = [];

            // ============================================================
            // 1. CUBO ROJO (en el centro de la pantalla)
            // ============================================================
            const center = map.getCenter();
            const centerMeters = lngLatToMeters(center.lng, center.lat);

            const cubeGeom = new THREE.BoxGeometry(2000, 2000, 2000);
            const cubeMat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.8
            });
            const cube = new THREE.Mesh(cubeGeom, cubeMat);
            cube.position.set(centerMeters.x, centerMeters.y, 1000);
            scene.add(cube);
            objects.push(cube);
            logDebug(`🔴 Cubo en (${centerMeters.x.toFixed(0)}, ${centerMeters.y.toFixed(0)})`);

            // ============================================================
            // 2. SEMIESFERA NARANJA (junto al cubo)
            // ============================================================
            const radius = 3000;

            // Semiesfera (mitad superior)
            const sphereGeom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat = new THREE.MeshPhongMaterial({
                color: 0xff6600,
                emissive: 0xff3300,
                emissiveIntensity: 1.0,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(sphereGeom, sphereMat);
            sphere.position.set(centerMeters.x + 5000, centerMeters.y + 5000, radius * 0.9);
            scene.add(sphere);
            objects.push(sphere);
            logDebug(`🟠 Semiesfera en (${(centerMeters.x+5000).toFixed(0)}, ${(centerMeters.y+5000).toFixed(0)})`);

            // Glow de la semiesfera
            const glowGeom = new THREE.SphereGeometry(radius * 2.5, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xff4400,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            scene.add(glow);
            objects.push(glow);

            // ============================================================
            // 3. SEMIESFERA VERDE (otra prueba)
            // ============================================================
            const sphereGeom2 = new THREE.SphereGeometry(radius * 0.7, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat2 = new THREE.MeshPhongMaterial({
                color: 0x00ff66,
                emissive: 0x00ff33,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const sphere2 = new THREE.Mesh(sphereGeom2, sphereMat2);
            sphere2.position.set(centerMeters.x - 5000, centerMeters.y + 5000, radius * 0.7);
            scene.add(sphere2);
            objects.push(sphere2);

            logDebug(`✅ ${objects.length} objetos creados`);
        }

        // ============================================================
        // ANIMACIÓN
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            // Rotar objetos
            objects.forEach((obj, i) => {
                if (i === 0) return; // El cubo no rota
                obj.rotation.y += 0.005;
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // REDIMENSIONAR
        // ============================================================
        window.addEventListener('resize', () => {
            if (!threeReady) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 300);

            // Recrear objetos cuando el mapa se mueva
            map.on('moveend', function() {
                if (threeReady) {
                    logDebug('🔄 Mapa movido, recreando objetos...');
                    createObjects();
                }
            });
        });

        // Intentar iniciar si el mapa ya está cargado
        setTimeout(() => {
            if (map.loaded()) {
                logDebug('ℹ️ Mapa ya cargado');
                initThree();
            }
        }, 2000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
