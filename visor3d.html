<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D REAL - Semiesferas</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0d1117; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
        #debug { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.9); color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-width: 350px; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🌍 Visor 3D REAL - Busca la semiesfera GIGANTE en Kyiv</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO...');

        // ============================================================
        // 1. MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [30.5234, 50.4501], // Kyiv
            zoom: 10,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // 2. THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;

        function lngLatToMeters(lng, lat) {
            const R = 6378137;
            const x = R * lng * Math.PI / 180;
            const y = R * Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
            return { x, y };
        }

        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            try {
                const center = map.getCenter();
                const zoom = map.getZoom();
                const pitch = map.getPitch();
                const bearing = map.getBearing();

                const centerMeters = lngLatToMeters(center.lng, center.lat);

                const canvas = map.getCanvas();
                const height = canvas.height;
                const fov = camera.fov * Math.PI / 180;
                const metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom);
                const cameraHeight = (height / 2) / Math.tan(fov / 2) * metersPerPixel;

                const pitchRad = pitch * Math.PI / 180;
                const bearingRad = -bearing * Math.PI / 180;

                const hDist = cameraHeight * Math.sin(pitchRad);
                const vDist = cameraHeight * Math.cos(pitchRad);

                const offsetX = hDist * Math.sin(bearingRad);
                const offsetY = hDist * Math.cos(bearingRad);
                const offsetZ = vDist;

                camera.position.set(
                    centerMeters.x + offsetX,
                    centerMeters.y + offsetY,
                    offsetZ
                );

                camera.lookAt(centerMeters.x, centerMeters.y, 0);
                camera.updateProjectionMatrix();

                const dist = Math.sqrt(offsetX * offsetX + offsetY * offsetY + offsetZ * offsetZ);
                camera.near = Math.max(0.1, dist * 0.0001);
                camera.far = Math.max(100000, dist * 20);
                camera.updateProjectionMatrix();

                logDebug(`📍 Cámara en (${camera.position.x.toFixed(0)}, ${camera.position.y.toFixed(0)}, ${camera.position.z.toFixed(0)})`);

            } catch (e) {
                logDebug('⚠️ Error sync: ' + e.message);
            }
        }

        function initThree() {
            if (threeReady) return;
            logDebug('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 10000000);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            // ============================================================
            // CREAR SEMIESFERA DE PRUEBA GIGANTE EN KYIV
            // ============================================================
            createTestSphere();

            animate(0);
        }

        // ============================================================
        // CREAR SEMIESFERA DE PRUEBA GIGANTE
        // ============================================================
        function createTestSphere() {
            const pos = lngLatToMeters(30.5234, 50.4501);
            const radius = 5000; // 5km de radio

            logDebug(`📍 Kyiv en metros: (${pos.x.toFixed(0)}, ${pos.y.toFixed(0)})`);
            logDebug(`🔴 Radio: ${radius} metros`);

            // SEMIESFERA GIGANTE
            const geom = new THREE.SphereGeometry(radius, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: 0xff6600,
                emissive: 0xff3300,
                emissiveIntensity: 1.5,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(pos.x, pos.y, radius * 0.9);
            scene.add(sphere);

            // GLOW GIGANTE
            const glowGeom = new THREE.SphereGeometry(radius * 3, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xff4400,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            scene.add(glow);

            // NÚCLEO
            const coreGeom = new THREE.SphereGeometry(radius * 0.3, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.copy(sphere.position);
            core.position.y += radius * 0.2;
            scene.add(core);

            logDebug('✅ Semiesfera GIGANTE creada en Kyiv');
            logDebug(`📐 Tamaño: ${radius/1000}km de radio`);
        }

        // ============================================================
        // ANIMACIÓN
        // ============================================================
        let lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            const delta = lastTime ? (time - lastTime) / 1000 : 0;
            lastTime = time;

            // Rotar la semiesfera de prueba
            scene.children.forEach(child => {
                if (child.isMesh) {
                    child.rotation.y += delta * 0.1;
                }
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            logDebug('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                logDebug('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
