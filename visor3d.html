<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visor Ucrania 3D</title>
<script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
</script>
<link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  #map { width: 100%; height: 100vh; }

  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(13,17,23,0.92); backdrop-filter: blur(8px);
    border: 1px solid #30363d; border-radius: 8px;
    padding: 12px 14px; width: 220px;
    max-height: calc(100% - 80px); overflow-y: auto;
    font-size: 12px; color: #e6edf3;
  }
  #panel h2 { font-size: 14px; margin-bottom: 8px; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
  .control-group { margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #21262d; }
  .control-group:last-child { border-bottom: none; }
  .control-group label { display: block; font-size: 10px; color: #8b949e; text-transform: uppercase; }
  .control-group input[type="range"] { width: 100%; margin: 2px 0; accent-color: #58a6ff; background: #30363d; height: 3px; }
  .control-group input[type="color"] { width: 24px; height: 24px; border: 2px solid #30363d; border-radius: 4px; padding: 0; cursor: pointer; background: transparent; }
  .checkbox-group { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .checkbox-group input[type="checkbox"] { accent-color: #58a6ff; width: 14px; height: 14px; cursor: pointer; }
  .color-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .slider-value { float: right; font-size: 10px; color: #58a6ff; }

  #info {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: rgba(13,17,23,0.85); padding: 4px 14px;
    border-radius: 20px; border: 1px solid #30363d; color: #8b949e;
    font-size: 11px; pointer-events: none; white-space: nowrap;
  }
</style>
</head>
<body>

<div id="panel">
  <h2>🎛️ Controles</h2>

  <!-- MAPA BASE -->
  <div class="control-group">
    <label>🗺️ Mapa base</label>
    <select id="map-style-selector">
      <option value="satellite">🛰️ Satélite</option>
      <option value="dark" selected>🌍 CartoDB Dark</option>
      <option value="osm">🌍 Callejero</option>
    </select>
  </div>

  <!-- DEEPSTATE -->
  <div class="control-group">
    <div class="checkbox-group">
      <input type="checkbox" id="chk-deepstate" checked>
      <label for="chk-deepstate">🟥 Línea del frente</label>
    </div>
    <div class="color-row">
      <input type="color" id="color-fill" value="#cc2200">
      <span>Relleno</span>
      <span style="margin-left:auto;">Opacidad <span class="slider-value" id="val-opacity-fill">0.45</span></span>
    </div>
    <input type="range" id="opacity-fill" min="0" max="100" value="45">
    <div class="color-row">
      <input type="color" id="color-line" value="#ffffff">
      <span>Borde</span>
      <span style="margin-left:auto;">Opacidad <span class="slider-value" id="val-opacity-line">0.90</span></span>
    </div>
    <input type="range" id="opacity-line" min="0" max="100" value="90">
  </div>

  <!-- INCENDIOS -->
  <div class="control-group">
    <div class="checkbox-group">
      <input type="checkbox" id="chk-fires" checked>
      <label for="chk-fires">🔥 Incendios</label>
    </div>
    <label>FRP mínimo <span class="slider-value" id="val-frp">10</span></label>
    <input type="range" id="frp-slider" min="0" max="100" value="10">
  </div>

  <!-- TERRENO -->
  <div class="control-group">
    <div class="checkbox-group">
      <input type="checkbox" id="chk-terrain" checked>
      <label for="chk-terrain">🏔️ Terreno 3D</label>
    </div>
    <label>Inclinación <span class="slider-value" id="val-pitch">45</span></label>
    <input type="range" id="pitch-slider" min="0" max="85" value="45">
  </div>

  <div style="display:flex; justify-content:space-between; font-size:10px; color:#8b949e; margin-top:4px;">
    <span id="stats">🔥 0 | 📦 0</span>
  </div>
</div>

<div id="info">🌍 Visor 3D Ucrania</div>
<div id="map"></div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const DEEPSTATE_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/deepstate_actual.geojson';
const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';

let deepstateData = null;
let firesData = [];
let currentStyle = 'dark';

const map = new maplibregl.Map({
  container: 'map',
  style: getStyleUrl('dark'),
  center: [32.0, 48.5],
  zoom: 5.5,
  pitch: 45,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

// ============================================================
// FUNCIONES DE ESTILO
// ============================================================

function getStyleUrl(style) {
  switch(style) {
    case 'satellite': return 'https://basemaps.cartocdn.com/gl/gl-maps-gl-style/style.json';
    case 'dark': return 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';
    case 'osm': return 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
    default: return 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';
  }
}

// ============================================================
// FUNCIONES DE ACTUALIZACIÓN
// ============================================================

function updateDeepstate() {
  if (!deepstateData) return;
  const enabled = document.getElementById('chk-deepstate').checked;
  const fillColor = document.getElementById('color-fill').value;
  const lineColor = document.getElementById('color-line').value;
  const fillOpacity = parseInt(document.getElementById('opacity-fill').value) / 100;
  const lineOpacity = parseInt(document.getElementById('opacity-line').value) / 100;

  ['deepstate-fill', 'deepstate-line'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  if (map.getSource('deepstate')) map.removeSource('deepstate');

  if (!enabled) return;

  map.addSource('deepstate', {
    type: 'geojson',
    data: deepstateData
  });

  map.addLayer({
    id: 'deepstate-fill',
    type: 'fill',
    source: 'deepstate',
    paint: {
      'fill-color': fillColor,
      'fill-opacity': fillOpacity,
    }
  });

  map.addLayer({
    id: 'deepstate-line',
    type: 'line',
    source: 'deepstate',
    paint: {
      'line-color': lineColor,
      'line-width': 2.5,
      'line-opacity': lineOpacity,
    }
  });

  updateStats();
}

// ============================================================
// ✅ FUNCIÓN CORREGIDA: updateFires()
// ============================================================
function updateFires() {
  const enabled = document.getElementById('chk-fires').checked;
  const frpMin = parseInt(document.getElementById('frp-slider').value) || 0;

  // Eliminar capa y fuente anteriores
  if (map.getLayer('fires-layer')) map.removeLayer('fires-layer');
  if (map.getSource('fires')) map.removeSource('fires');

  if (!enabled || firesData.length === 0) {
    updateStats();
    return;
  }

  // Filtrar por FRP mínimo
  const filtered = firesData.filter(f => (f.properties?.frp || 0) >= frpMin);
  if (filtered.length === 0) {
    updateStats();
    return;
  }

  map.addSource('fires', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: filtered }
  });

  map.addLayer({
    id: 'fires-layer',
    type: 'circle',
    source: 'fires',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['get', 'frp'], 10, 4, 100, 12, 500, 22],
      'circle-color': ['interpolate', ['linear'], ['get', 'frp'], 10, '#ffcc00', 100, '#ff6600', 500, '#ff0000'],
      'circle-opacity': 0.85,
      'circle-stroke-color': '#ffffff',
      'circle-stroke-width': 1,
    }
  });

  // Popup (eliminar listeners anteriores para evitar duplicados)
  map.off('click', 'fires-layer');
  map.on('click', 'fires-layer', function(e) {
    const p = e.features[0].properties;
    new maplibregl.Popup()
      .setLngLat(e.lngLat)
      .setHTML(`🔥 FRP: ${p.frp} MW<br>📅 ${p.acq_date}`)
      .addTo(map);
  });

  updateStats();
}

function updateTerrain() {
  const enabled = document.getElementById('chk-terrain').checked;
  const pitch = parseInt(document.getElementById('pitch-slider').value);

  if (enabled) {
    if (!map.getSource('terrainSource')) {
      map.addSource('terrainSource', {
        type: 'raster-dem',
        tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
        tileSize: 256, encoding: 'terrarium', maxzoom: 14
      });
    }
    map.setTerrain({ source: 'terrainSource', exaggeration: 2.0 });
    map.setPitch(pitch);
  } else {
    map.setTerrain(null);
    map.setPitch(0);
  }
}

function updateStats() {
  const frpMin = parseInt(document.getElementById('frp-slider').value) || 0;
  const n1 = firesData.filter(f => (f.properties?.frp || 0) >= frpMin).length;
  const n2 = deepstateData?.features?.length || 0;
  document.getElementById('stats').textContent = `🔥 ${n1} | 📦 ${n2}`;
}

// ============================================================
// MAPA BASE
// ============================================================

function updateBaseMap() {
  const selected = document.getElementById('map-style-selector').value;

  if (selected === 'satellite') {
    if (map.getLayer('satellite-layer')) map.removeLayer('satellite-layer');
    if (map.getSource('satellite-source')) map.removeSource('satellite-source');

    map.setStyle({ version: 8, sources: {}, layers: [] });

    map.once('style.load', function() {
      map.addSource('satellite-source', {
        type: 'raster',
        tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256
      });

      map.addLayer({
        id: 'satellite-layer',
        type: 'raster',
        source: 'satellite-source'
      });

      setTimeout(() => {
        if (deepstateData) updateDeepstate();
        if (firesData.length > 0) updateFires();
      }, 200);
    });

  } else {
    const styleUrl = getStyleUrl(selected);
    map.setStyle(styleUrl);

    map.once('style.load', function() {
      setTimeout(() => {
        if (deepstateData) updateDeepstate();
        if (firesData.length > 0) updateFires();
      }, 200);
    });
  }

  currentStyle = selected;
}

// ============================================================
// CARGAR DATOS
// ============================================================

fetch(DEEPSTATE_URL)
  .then(r => r.json())
  .then(data => {
    deepstateData = data;
    map.on('load', function() {
      updateDeepstate();
      updateStats();
    });
  })
  .catch(e => console.error('DeepState error:', e));

fetch(FIRMS_URL)
  .then(r => r.json())
  .then(data => {
    firesData = data.features || [];
    map.on('load', function() {
      updateFires();
      updateStats();
    });
  })
  .catch(e => console.error('FIRMS error:', e));

// ============================================================
// CONTROLES
// ============================================================

document.getElementById('map-style-selector').addEventListener('change', updateBaseMap);

document.getElementById('chk-deepstate').addEventListener('change', updateDeepstate);
document.getElementById('color-fill').addEventListener('input', updateDeepstate);
document.getElementById('color-line').addEventListener('input', updateDeepstate);
document.getElementById('opacity-fill').addEventListener('input', function() {
  document.getElementById('val-opacity-fill').textContent = (this.value / 100).toFixed(2);
  updateDeepstate();
});
document.getElementById('opacity-line').addEventListener('input', function() {
  document.getElementById('val-opacity-line').textContent = (this.value / 100).toFixed(2);
  updateDeepstate();
});

document.getElementById('chk-fires').addEventListener('change', updateFires);
// ✅ EVENTO CORREGIDO: ahora llama a updateFires() y actualiza el valor mostrado
document.getElementById('frp-slider').addEventListener('input', function() {
  document.getElementById('val-frp').textContent = this.value;
  updateFires();  // <--- ESTA ES LA LÍNEA CLAVE
});

document.getElementById('chk-terrain').addEventListener('change', updateTerrain);
document.getElementById('pitch-slider').addEventListener('input', function() {
  document.getElementById('val-pitch').textContent = this.value;
  updateTerrain();
});

// ============================================================
// INICIAR
// ============================================================

map.on('load', function() {
  updateTerrain();
  console.log('✅ Visor listo');
});
</script>
</body>
</html>
