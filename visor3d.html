<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Ucrania 3D</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; }
        #cesium-container { width: 100vw; height: 100vh; position: relative; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-width: 350px;
            max-height: 300px;
            overflow: auto;
        }
        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>

    <div id="cesium-container"></div>
    <div id="info">🔥 Visor 3D - Incendios Ucrania</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO...');

        // ============================================================
        // 1. CESIUM SIN TOKEN
        // ============================================================
        const viewer = new Cesium.Viewer('cesium-container', {
            imageryProvider: new Cesium.UrlTemplateImageryProvider({
                url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                credit: 'OpenStreetMap'
            }),
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            vrButton: false
        });

        // Configurar cámara (Ucrania)
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 500000),
            orientation: {
                pitch: Cesium.Math.toRadians(-45),
                heading: Cesium.Math.toRadians(0),
                roll: 0
            }
        });

        logDebug('✅ Cesium listo');

        // ============================================================
        // 2. FUNCIONES
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        function createFireSphere(lon, lat, frp) {
            const t = Math.min(frp / 500, 1);
            const radius = 2000 + t * 8000;
            
            const r = 1.0;
            const g = 1.0 - t * 0.8;
            const b = 0.3 - t * 0.25;

            const position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);
            
            // Usar Entity en lugar de geometría manual (más simple y funciona mejor)
            const entity = viewer.entities.add({
                position: position,
                ellipsoid: {
                    radii: new Cesium.Cartesian3(radius, radius, radius),
                    material: new Cesium.Color(r, g, b, 0.6),
                    emissiveColor: new Cesium.Color(r * 0.8, g * 0.5, b * 0.3, 0.8),
                    outline: false,
                    // Solo la mitad superior
                    slicePart: 0.5
                }
            });

            // Glow (círculo en el suelo)
            const glowEntity = viewer.entities.add({
                position: position,
                ellipse: {
                    semiMinorAxis: radius * 3,
                    semiMajorAxis: radius * 3,
                    material: new Cesium.Color(r, g * 0.4, b * 0.2, 0.15),
                    outline: false
                }
            });

            return { sphere: entity, glow: glowEntity };
        }

        // ============================================================
        // 3. CARGAR INCENDIOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';
        let fireEntities = [];

        function loadFires() {
            logDebug('📡 Cargando incendios...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    const features = data.features || [];
                    logDebug(`✅ ${features.length} incendios cargados`);
                    createFires(features);
                })
                .catch(e => {
                    logDebug('❌ Error: ' + e.message + ' - Usando prueba');
                    createTestFires();
                });
        }

        function createFires(features) {
            // Limpiar anteriores
            fireEntities.forEach(entity => {
                viewer.entities.remove(entity);
            });
            fireEntities = [];

            const toRender = features.slice(0, 100);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const entities = createFireSphere(lon, lat, frp);
                    fireEntities.push(entities.sphere);
                    fireEntities.push(entities.glow);
                } catch (e) {
                    logDebug('❌ Error creando: ' + e.message);
                }
            });

            logDebug(`✅ ${fireEntities.length / 2} semiesferas creadas`);
        }

        function createTestFires() {
            logDebug('🔥 Usando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100]
            ];

            testFires.forEach(([lon, lat, frp]) => {
                const entities = createFireSphere(lon, lat, frp);
                fireEntities.push(entities.sphere);
                fireEntities.push(entities.glow);
            });

            logDebug(`✅ ${fireEntities.length / 2} semiesferas de prueba en Kyiv`);
        }

        // ============================================================
        // 4. INICIAR
        // ============================================================
        setTimeout(() => {
            loadFires();
        }, 1000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
