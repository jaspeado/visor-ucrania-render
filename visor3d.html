<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Cubo + Semiesferas</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔴 Cubo rojo + Semiesferas</div>

    <script>
        console.log('🚀 INICIANDO...');

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 0,
            antialias: true
        });

        // ============================================================
        // THREE.JS - VERSIÓN QUE FUNCIONA (con cubo)
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;

        function initThree() {
            if (threeReady) return;
            console.log('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // Fondo negro

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0xff0000, 0.3);
            container.appendChild(renderer.domElement);

            threeReady = true;
            console.log('✅ Three.js listo');

            // ============================================================
            // CUBO ROJO (SIEMPRE VISIBLE)
            // ============================================================
            const cubeGeom = new THREE.BoxGeometry(2, 2, 2);
            const cubeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(cubeGeom, cubeMat);
            scene.add(cube);

            // ============================================================
            // SEMIESFERAS (alrededor del cubo)
            // ============================================================
            const radius = 1.5;

            // Semiesfera naranja
            const sphereGeom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat = new THREE.MeshPhongMaterial({
                color: 0xff6600,
                emissive: 0xff3300,
                emissiveIntensity: 1.0,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(sphereGeom, sphereMat);
            sphere.position.set(3, 0, 0);
            scene.add(sphere);

            // Glow
            const glowGeom = new THREE.SphereGeometry(radius * 2, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xff4400,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            scene.add(glow);

            // Semiesfera verde
            const sphereGeom2 = new THREE.SphereGeometry(radius * 0.8, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat2 = new THREE.MeshPhongMaterial({
                color: 0x00ff66,
                emissive: 0x00ff33,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const sphere2 = new THREE.Mesh(sphereGeom2, sphereMat2);
            sphere2.position.set(-3, 2, 0);
            scene.add(sphere2);

            // Semiesfera azul
            const sphereGeom3 = new THREE.SphereGeometry(radius * 0.6, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const sphereMat3 = new THREE.MeshPhongMaterial({
                color: 0x0066ff,
                emissive: 0x0033ff,
                emissiveIntensity: 0.6,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const sphere3 = new THREE.Mesh(sphereGeom3, sphereMat3);
            sphere3.position.set(-3, -2, 0);
            scene.add(sphere3);

            // Luces para las semiesferas
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            console.log('✅ Cubo + 3 semiesferas creadas');

            // ============================================================
            // ANIMACIÓN
            // ============================================================
            function animate() {
                requestAnimationFrame(animate);

                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;

                sphere.rotation.y += 0.02;
                sphere2.rotation.y += 0.015;
                sphere3.rotation.y += 0.01;

                renderer.render(scene, camera);
            }

            animate();

            // ============================================================
            // REDIMENSIONAR
            // ============================================================
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            console.log('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            console.log('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                console.log('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        console.log('🚀 Visor iniciado');
    </script>
</body>
</html>
