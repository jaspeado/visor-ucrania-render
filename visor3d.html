<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Semiesferas</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0d1117; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10;
            background: transparent !important;
        }
        #info { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000; 
            background: rgba(0,0,0,0.8); 
            color: #0f0; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-family: monospace; 
            font-size: 14px; 
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-width: 350px;
            max-height: 300px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔥 Semiesferas 3D - Ucrania</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO...');

        // ============================================================
        // 1. MAPA - CON ESTILO OSCURO QUE SIEMPRE FUNCIONA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                'version': 8,
                'sources': {
                    'osm': {
                        'type': 'raster',
                        'tiles': ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        'tileSize': 256,
                        'attribution': '© OpenStreetMap'
                    }
                },
                'layers': [{
                    'id': 'osm',
                    'type': 'raster',
                    'source': 'osm'
                }]
            },
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        logDebug('✅ Mapa creado');

        // ============================================================
        // 2. THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;
        let fireMeshes = [];

        function initThree() {
            if (threeReady) return;
            logDebug('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000000);

            renderer = new THREE.WebGLRenderer({ 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            renderer.setAlpha(true);
            container.appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            // Crear semiesferas
            createTestData();
            animate();
        }

        // ============================================================
        // 3. CONVERTIR COORDENADAS
        // ============================================================
        function lngLatToMeters(lng, lat) {
            const R = 6378137;
            const x = R * lng * Math.PI / 180;
            const y = R * Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360));
            return { x, y };
        }

        // ============================================================
        // 4. SINCRONIZAR CÁMARA
        // ============================================================
        function syncCamera() {
            if (!map || !camera || !threeReady) return;

            const center = map.getCenter();
            const zoom = map.getZoom();
            const pitch = map.getPitch();
            const bearing = map.getBearing();

            const centerMeters = lngLatToMeters(center.lng, center.lat);

            const canvas = map.getCanvas();
            const height = canvas.height;
            const fov = camera.fov * Math.PI / 180;
            const metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom);
            const cameraHeight = (height / 2) / Math.tan(fov / 2) * metersPerPixel;

            const pitchRad = pitch * Math.PI / 180;
            const bearingRad = -bearing * Math.PI / 180;

            const hDist = cameraHeight * Math.sin(pitchRad);
            const vDist = cameraHeight * Math.cos(pitchRad);

            const offsetX = hDist * Math.sin(bearingRad);
            const offsetY = hDist * Math.cos(bearingRad);
            const offsetZ = vDist;

            camera.position.set(
                centerMeters.x + offsetX,
                centerMeters.y + offsetY,
                offsetZ
            );

            camera.lookAt(centerMeters.x, centerMeters.y, 0);
            camera.updateProjectionMatrix();

            const dist = Math.sqrt(offsetX*offsetX + offsetY*offsetY + offsetZ*offsetZ);
            camera.near = Math.max(0.1, dist * 0.0001);
            camera.far = Math.max(100000, dist * 20);
            camera.updateProjectionMatrix();
        }

        // ============================================================
        // 5. CREAR SEMIESFERA 3D (apunta hacia abajo)
        // ============================================================
        function createFireSphere(lon, lat, frp) {
            const pos = lngLatToMeters(lon, lat);
            
            const t = Math.min(frp / 500, 1);
            const radius = 500 + t * 2500;

            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();

            // SEMIESFERA - mitas superior (Z positivo)
            const geom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 0.8 + t * 1.0,
                transparent: true,
                opacity: 0.85 + t * 0.15,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(pos.x, pos.y, radius * 0.9);
            group.add(sphere);

            // GLOW
            const glowGeom = new THREE.SphereGeometry(radius * 3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.4)}, ${Math.round(b * 0.2)})`),
                transparent: true,
                opacity: 0.12 + t * 0.12,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            group.add(glow);

            // NÚCLEO
            const coreGeom = new THREE.SphereGeometry(radius * 0.4, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.8 + t * 0.2,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.copy(sphere.position);
            core.position.y += radius * 0.2;
            group.add(core);

            group.userData = { frp, lon, lat, radius };

            return group;
        }

        // ============================================================
        // 6. DATOS DE PRUEBA
        // ============================================================
        function createTestData() {
            logDebug('🔥 Creando semiesferas de prueba...');
            
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100],
                [30.8, 50.6, 250],
                [30.2, 50.3, 180]
            ];

            testFires.forEach(([lon, lat, frp]) => {
                const group = createFireSphere(lon, lat, frp);
                scene.add(group);
                fireMeshes.push(group);
            });

            logDebug(`✅ ${fireMeshes.length} semiesferas creadas`);
        }

        // ============================================================
        // 7. ANIMACIÓN
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            syncCamera();

            const time = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                group.rotation.y += 0.005;
                const pulse = Math.sin(time * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // 8. INICIAR
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            logDebug('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                logDebug('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
