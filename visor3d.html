<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Ucrania 3D - CesiumJS</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #cesium-container { width: 100vw; height: 100vh; position: relative; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-width: 350px;
            max-height: 300px;
            overflow: auto;
        }
        .cesium-viewer-bottom {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="cesium-container"></div>
    <div id="info">🔥 Visor 3D - Incendios Ucrania (CesiumJS)</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO CesiumJS...');

        // ============================================================
        // 1. CONFIGURAR CESIUM
        // ============================================================
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1ZTRhMDBhNS05Y2FhLTQxYzQtYThhZC0zMjYwZDU3MjAzYWMiLCJpZCI6MjU5LCJpYXQiOjE1MzYyMzk5Mzl9.XvDdRjS7LqCw6bbBBhgMcJmz0b_9h-D7bWZ_H1XIrL8';

        const viewer = new Cesium.Viewer('cesium-container', {
            terrainProvider: Cesium.createWorldTerrain(),
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            vrButton: false
        });

        // Configurar cámara (Ucrania)
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(32.0, 48.5, 800000),
            orientation: {
                pitch: Cesium.Math.toRadians(-45),
                heading: Cesium.Math.toRadians(0),
                roll: 0
            }
        });

        logDebug('✅ Cesium listo');

        // ============================================================
        // 2. CENTROIDE DE POLÍGONO
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // 3. CREAR SEMIESFERA 3D CON GLOW
        // ============================================================
        function createFireSphere(lon, lat, frp, viewer) {
            const t = Math.min(frp / 500, 1);
            
            // Tamaño: de 500m a 3000m según FRP
            const radius = 500 + t * 2500;
            
            // Color: amarillo → naranja → rojo
            const r = 1.0;
            const g = 1.0 - t * 0.8;
            const b = 0.3 - t * 0.25;

            const position = Cesium.Cartesian3.fromDegrees(lon, lat, 0);

            // ============================================================
            // SEMIESFERA PRINCIPAL
            // ============================================================
            const sphereGeometry = new Cesium.SphereGeometry({
                radius: radius,
                slicePart: 0.5
            });

            const sphereMaterial = new Cesium.Material({
                fabric: {
                    type: 'Color',
                    uniforms: {
                        color: new Cesium.Color(r, g, b, 0.8)
                    }
                }
            });

            const sphere = new Cesium.MeshPrimitive({
                geometryInstances: new Cesium.GeometryInstance({
                    geometry: sphereGeometry,
                    modelMatrix: Cesium.Matrix4.multiplyByTranslation(
                        Cesium.Transforms.eastNorthUpToFixedFrame(position),
                        new Cesium.Cartesian3(0, 0, 0),
                        new Cesium.Matrix4()
                    ),
                    attributes: {
                        color: Cesium.ColorGeometryInstanceAttribute.fromColor(
                            new Cesium.Color(r, g, b, 0.8)
                        )
                    }
                }),
                appearance: new Cesium.MaterialAppearance({
                    material: sphereMaterial,
                    faceForward: false,
                    translucent: true,
                    closed: false
                })
            });

            viewer.scene.primitives.add(sphere);

            // ============================================================
            // GLOW EXTERIOR (más grande y difuso)
            // ============================================================
            const glowRadius = radius * 3;
            const glowGeometry = new Cesium.SphereGeometry({
                radius: glowRadius,
                slicePart: 0.5
            });

            const glowMaterial = new Cesium.Material({
                fabric: {
                    type: 'Color',
                    uniforms: {
                        color: new Cesium.Color(r, g * 0.5, b * 0.3, 0.15)
                    }
                }
            });

            const glow = new Cesium.MeshPrimitive({
                geometryInstances: new Cesium.GeometryInstance({
                    geometry: glowGeometry,
                    modelMatrix: Cesium.Matrix4.multiplyByTranslation(
                        Cesium.Transforms.eastNorthUpToFixedFrame(position),
                        new Cesium.Cartesian3(0, 0, 0),
                        new Cesium.Matrix4()
                    ),
                    attributes: {
                        color: Cesium.ColorGeometryInstanceAttribute.fromColor(
                            new Cesium.Color(r, g * 0.5, b * 0.3, 0.15)
                        )
                    }
                }),
                appearance: new Cesium.MaterialAppearance({
                    material: glowMaterial,
                    faceForward: false,
                    translucent: true,
                    closed: false
                })
            });

            viewer.scene.primitives.add(glow);

            // ============================================================
            // NÚCLEO BRILLANTE
            // ============================================================
            const coreRadius = radius * 0.3;
            const coreGeometry = new Cesium.SphereGeometry({
                radius: coreRadius,
                slicePart: 0.5
            });

            const coreMaterial = new Cesium.Material({
                fabric: {
                    type: 'Color',
                    uniforms: {
                        color: new Cesium.Color(1.0, Math.min(g + 0.3, 1.0), Math.min(b + 0.3, 1.0), 0.9)
                    }
                }
            });

            const core = new Cesium.MeshPrimitive({
                geometryInstances: new Cesium.GeometryInstance({
                    geometry: coreGeometry,
                    modelMatrix: Cesium.Matrix4.multiplyByTranslation(
                        Cesium.Transforms.eastNorthUpToFixedFrame(position),
                        new Cesium.Cartesian3(0, 0, radius * 0.2),
                        new Cesium.Matrix4()
                    ),
                    attributes: {
                        color: Cesium.ColorGeometryInstanceAttribute.fromColor(
                            new Cesium.Color(1.0, Math.min(g + 0.3, 1.0), Math.min(b + 0.3, 1.0), 0.9)
                        )
                    }
                }),
                appearance: new Cesium.MaterialAppearance({
                    material: coreMaterial,
                    faceForward: false,
                    translucent: true,
                    closed: false
                })
            });

            viewer.scene.primitives.add(core);

            // ============================================================
            // ANILLO EN EL SUELO
            // ============================================================
            const ringPositions = [];
            const segments = 32;
            const ringRadius = radius * 0.8;
            
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = ringRadius * Math.cos(angle);
                const y = ringRadius * Math.sin(angle);
                ringPositions.push(x, y, 0);
            }

            const ringGeometry = new Cesium.PolylineGeometry({
                positions: Cesium.Cartesian3.fromDegreesArrayHeights(
                    ringPositions.map((v, i) => {
                        if (i % 3 === 0) return lon + v / 111000;
                        if (i % 3 === 1) return lat + v / 111000;
                        return 0;
                    })
                ),
                width: 2
            });

            const ring = new Cesium.PolylinePrimitive({
                geometryInstances: new Cesium.GeometryInstance({
                    geometry: ringGeometry,
                    attributes: {
                        color: Cesium.ColorGeometryInstanceAttribute.fromColor(
                            new Cesium.Color(r, g * 0.7, b * 0.4, 0.3)
                        )
                    }
                }),
                appearance: new Cesium.PolylineMaterialAppearance({
                    material: new Cesium.Material({
                        fabric: {
                            type: 'Color',
                            uniforms: {
                                color: new Cesium.Color(r, g * 0.7, b * 0.4, 0.3)
                            }
                        }
                    })
                })
            });

            viewer.scene.primitives.add(ring);

            return { sphere, glow, core, ring };
        }

        // ============================================================
        // 4. CARGAR INCENDIOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';
        let fireObjects = [];

        function loadFires() {
            logDebug('📡 Cargando incendios...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    const features = data.features || [];
                    logDebug(`✅ ${features.length} incendios cargados`);
                    createFires(features);
                })
                .catch(e => {
                    logDebug('❌ Error: ' + e.message + ' - Usando datos de prueba');
                    createTestFires();
                });
        }

        function createFires(features) {
            // Limpiar anteriores
            fireObjects.forEach(obj => {
                viewer.scene.primitives.remove(obj);
            });
            fireObjects = [];

            const toRender = features.slice(0, 200);
            let count = 0;

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const objects = createFireSphere(lon, lat, frp, viewer);
                    fireObjects.push(objects.sphere);
                    fireObjects.push(objects.glow);
                    fireObjects.push(objects.core);
                    fireObjects.push(objects.ring);
                    count++;
                } catch (e) {
                    // Silencioso
                }
            });

            logDebug(`✅ ${count} semiesferas creadas`);
        }

        function createTestFires() {
            logDebug('🔥 Usando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100],
                [30.8, 50.6, 250],
                [30.2, 50.3, 180]
            ];

            testFires.forEach(([lon, lat, frp]) => {
                const objects = createFireSphere(lon, lat, frp, viewer);
                fireObjects.push(objects.sphere);
                fireObjects.push(objects.glow);
                fireObjects.push(objects.core);
                fireObjects.push(objects.ring);
            });

            logDebug(`✅ ${fireObjects.length / 4} semiesferas de prueba en Kyiv`);
        }

        // ============================================================
        // 5. INICIALIZAR
        // ============================================================
        setTimeout(() => {
            logDebug('📡 Cargando datos...');
            loadFires();
        }, 1000);

        logDebug('🚀 Visor CesiumJS iniciado');
    </script>
</body>
</html>
