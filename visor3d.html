<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor 3D con Controles</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ======================================== */
        /* PANEL DE CONTROL                        */
        /* ======================================== */
        #panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(13, 17, 23, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 16px;
            width: 290px;
            max-height: calc(100% - 20px);
            overflow-y: auto;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            pointer-events: auto;
        }
        #panel::-webkit-scrollbar {
            width: 4px;
        }
        #panel::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        #panel::-webkit-scrollbar-track {
            background: transparent;
        }

        #panel h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f0f6fc;
            border-bottom: 1px solid #30363d;
            padding-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .control-group {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #21262d;
        }
        .control-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .control-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #8b949e;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin: 2px 0 4px;
            accent-color: #58a6ff;
            background: #30363d;
            height: 4px;
            border-radius: 4px;
            -webkit-appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #58a6ff;
            cursor: pointer;
        }

        .control-group input[type="color"] {
            width: 28px;
            height: 28px;
            border: 2px solid #30363d;
            border-radius: 4px;
            padding: 0;
            cursor: pointer;
            background: transparent;
            flex-shrink: 0;
        }

        .control-group select {
            width: 100%;
            padding: 4px 8px;
            background: #0d1117;
            color: #e6edf3;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .control-group select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 2px 0;
        }
        .checkbox-group input[type="checkbox"] {
            accent-color: #58a6ff;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 13px;
            color: #e6edf3;
            text-transform: none;
            font-weight: 400;
            cursor: pointer;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .color-row span {
            font-size: 11px;
            color: #8b949e;
        }

        .slider-value {
            float: right;
            font-size: 11px;
            color: #58a6ff;
            font-weight: 500;
        }

        .layer-order {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .layer-order button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .layer-order button:hover {
            background: #30363d;
            border-color: #58a6ff;
        }
        .layer-order button.active {
            background: #58a6ff;
            border-color: #58a6ff;
            color: #0d1117;
        }

        #map-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
        }

        .layer-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 640px) {
            #panel {
                width: 220px;
                padding: 10px 12px;
                font-size: 12px;
                max-height: calc(100% - 80px);
                top: 70px;
                left: 6px;
            }
        }
    </style>
</head>
<body>

    <!-- PANEL DE CONTROL -->
    <div id="panel">
        <h2>🎛️ Controles</h2>

        <!-- ====================== -->
        <!-- CAPA: INCENDIOS        -->
        <!-- ====================== -->
        <div class="control-group">
            <div class="checkbox-group">
                <input type="checkbox" id="chk-fires" checked>
                <label for="chk-fires">🔥 Incendios (VIIRS)</label>
            </div>
            <div class="color-row">
                <input type="color" id="color-fires" value="#FF3300">
                <span>Color</span>
                <span style="margin-left:auto; font-size:11px;">Opacidad <span class="slider-value" id="val-opacity-fires">0.85</span></span>
            </div>
            <input type="range" id="opacity-fires" min="0" max="100" value="85">
        </div>

        <!-- ====================== -->
        <!-- CAPA: DEEPSTATE        -->
        <!-- ====================== -->
        <div class="control-group">
            <div class="checkbox-group">
                <input type="checkbox" id="chk-deepstate" checked>
                <label for="chk-deepstate">🟥 Línea del frente</label>
            </div>
            <label>Fecha</label>
            <select id="deepstate-date">
                <option value="">Cargando fechas...</option>
            </select>
            <div class="color-row">
                <input type="color" id="color-deepstate-fill" value="#FF0000">
                <span>Relleno</span>
                <span style="margin-left:auto; font-size:11px;">Opacidad <span class="slider-value" id="val-opacity-ds-fill">0.40</span></span>
            </div>
            <input type="range" id="opacity-ds-fill" min="0" max="100" value="40">
            <div class="color-row" style="margin-top:4px;">
                <input type="color" id="color-deepstate-line" value="#FFFFFF">
                <span>Borde</span>
                <span style="margin-left:auto; font-size:11px;">Opacidad <span class="slider-value" id="val-opacity-ds-line">0.80</span></span>
            </div>
            <input type="range" id="opacity-ds-line" min="0" max="100" value="80">
        </div>

        <!-- ====================== -->
        <!-- MAPA BASE              -->
        <!-- ====================== -->
        <div class="control-group">
            <label>🗺️ Mapa base</label>
            <select id="map-style-selector">
                <option value="satellite">🛰️ Satélite (ArcGIS)</option>
                <option value="osm" selected>🌍 Callejero (OpenStreetMap)</option>
                <option value="topo">🗺️ Topográfico (OpenTopoMap)</option>
            </select>
            <div style="margin-top:4px;">
                <div class="checkbox-group">
                    <input type="checkbox" id="chk-terrain" checked>
                    <label for="chk-terrain">🏔️ Terreno 3D</label>
                </div>
                <label>Inclinación <span class="slider-value" id="val-pitch">65</span></label>
                <input type="range" id="pitch-control" min="0" max="85" value="65">
            </div>
        </div>

        <!-- ====================== -->
        <!-- ORDEN DE CAPAS         -->
        <!-- ====================== -->
        <div class="control-group" style="border-bottom: none; margin-bottom: 0;">
            <label>📚 Orden de capas</label>
            <div class="layer-order">
                <button class="active" data-layer="base">Base</button>
                <button data-layer="deepstate">Frente</button>
                <button data-layer="fires">Incendios</button>
            </div>
            <div style="font-size:11px; color:#8b949e; margin-top:4px;">
                Haz clic para mover una capa al frente
            </div>
        </div>

        <!-- Stats -->
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#8b949e; margin-top:8px; padding-top:6px; border-top:1px solid #21262d;">
            <span id="stats-fires">🔥 0</span>
            <span id="stats-date">📅 --</span>
        </div>
    </div>

    <!-- Info en el mapa -->
    <div id="map-info">🌍 Visor 3D Ucrania | Clic en un punto para ver detalles</div>

    <!-- MAPA -->
    <div id="map"></div>

    <!-- SCRIPTS -->
    <script>
        // ============================================================
        // 1. CONFIGURACIÓN
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';

        let map;
        let allFiresData = [];
        let allDeepstateData = {};
        let deepstateDates = [];
        let currentDeepstateDate = '';

        // IDs de capas
        const LAYER_IDS = {
            BASE: 'base-layer',
            DEEPSTATE_FILL: 'deepstate-fill-layer',
            DEEPSTATE_LINE: 'deepstate-line-layer',
            FIRES: 'fires-layer'
        };

        const SOURCE_IDS = {
            BASE: 'base-source',
            DEEPSTATE: 'deepstate-source',
            FIRES: 'fires-source'
        };

        // Orden de capas (de abajo a arriba)
        let layerOrder = ['BASE', 'DEEPSTATE_FILL', 'DEEPSTATE_LINE', 'FIRES'];

        // ============================================================
        // 2. INICIALIZAR MAPA
        // ============================================================
        map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {},
                layers: []
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 65,
            maxPitch: 85
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // 3. REORDENAR CAPAS
        // ============================================================
        function reorderLayers() {
            // Obtener todas las capas que están en el mapa
            const mapLayers = map.getStyle().layers || [];
            const layerIds = mapLayers.map(l => l.id);

            // Orden inverso (de arriba a abajo)
            const orderedIds = [];
            for (let i = layerOrder.length - 1; i >= 0; i--) {
                const key = layerOrder[i];
                const id = LAYER_IDS[key];
                if (layerIds.includes(id)) {
                    orderedIds.push(id);
                }
            }

            // Mover capas al orden correcto
            let beforeId = undefined;
            for (let i = orderedIds.length - 1; i >= 0; i--) {
                const id = orderedIds[i];
                if (map.getLayer(id)) {
                    map.moveLayer(id, beforeId);
                    beforeId = id;
                }
            }
        }

        // ============================================================
        // 4. CARGAR DATOS
        // ============================================================

        function loadFires() {
            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    allFiresData = data.features || [];
                    console.log('🔥 FIRMS cargados:', allFiresData.length);
                    updateFires();
                    document.getElementById('stats-fires').textContent = '🔥 ' + allFiresData.length;
                })
                .catch(e => console.error('Error FIRMS:', e));
        }

        function loadDeepstate() {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
            script.onload = function() {
                fetch(DEEPSTATE_URL)
                    .then(r => r.arrayBuffer())
                    .then(buffer => {
                        const data = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                        const geojson = JSON.parse(data);
                        allDeepstateData = geojson;
                        const features = geojson.features || [];
                        
                        const fechas = new Set();
                        features.forEach(f => {
                            const d = f.properties?.date || '';
                            if (d) fechas.add(d);
                        });
                        deepstateDates = Array.from(fechas).sort();
                        console.log('🟥 DeepState cargado:', features.length, 'fechas:', deepstateDates.length);
                        
                        const sel = document.getElementById('deepstate-date');
                        sel.innerHTML = '';
                        deepstateDates.forEach(d => {
                            const opt = document.createElement('option');
                            opt.value = d;
                            opt.textContent = d;
                            sel.appendChild(opt);
                        });
                        if (deepstateDates.length > 0) {
                            sel.value = deepstateDates[deepstateDates.length - 1];
                            currentDeepstateDate = sel.value;
                            updateDeepstate();
                        }
                    })
                    .catch(e => console.error('Error DeepState:', e));
            };
            document.head.appendChild(script);
        }

        // ============================================================
        // 5. ACTUALIZAR CAPAS
        // ============================================================

        function updateFires() {
            const enabled = document.getElementById('chk-fires').checked;
            const opacity = parseInt(document.getElementById('opacity-fires').value) / 100;
            const color = document.getElementById('color-fires').value;

            const filtered = allFiresData
                .filter(f => (f.properties?.frp || 0) > 10)
                .slice(0, 500);

            const sourceId = SOURCE_IDS.FIRES;
            const layerId = LAYER_IDS.FIRES;

            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            if (!enabled || filtered.length === 0) return;

            map.addSource(sourceId, {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: filtered
                }
            });

            map.addLayer({
                id: layerId,
                type: 'circle',
                source: sourceId,
                paint: {
                    'circle-radius': [
                        'interpolate', ['linear'], ['get', 'frp'],
                        10, 4,
                        50, 12,
                        100, 20
                    ],
                    'circle-color': color,
                    'circle-opacity': opacity,
                    'circle-stroke-color': '#FFFF00',
                    'circle-stroke-width': 1,
                    'circle-stroke-opacity': 0.7
                }
            });

            // Popup
            const popup = new maplibregl.Popup({ closeButton: true, closeOnClick: false });
            map.on('click', layerId, function(e) {
                const props = e.features[0].properties;
                popup
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <strong>🔥 FRP:</strong> ${props.frp || 0} MW<br>
                        <strong>📅 Fecha:</strong> ${props.acq_date || 'N/A'}<br>
                        <strong>🛰️ Satélite:</strong> ${props.satellite || 'N/A'}<br>
                        <strong>📍 Localidad:</strong> ${props.locality || 'N/A'}<br>
                        <strong>🗺️ Oblast:</strong> ${props.NAME_1 || 'N/A'}
                    `)
                    .addTo(map);
            });

            map.on('mouseenter', layerId, function() {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', layerId, function() {
                map.getCanvas().style.cursor = '';
            });

            reorderLayers();
        }

        function updateDeepstate() {
            const enabled = document.getElementById('chk-deepstate').checked;
            const fillColor = document.getElementById('color-deepstate-fill').value;
            const lineColor = document.getElementById('color-deepstate-line').value;
            const fillOpacity = parseInt(document.getElementById('opacity-ds-fill').value) / 100;
            const lineOpacity = parseInt(document.getElementById('opacity-ds-line').value) / 100;
            const date = document.getElementById('deepstate-date').value;

            const sourceId = SOURCE_IDS.DEEPSTATE;
            const fillLayerId = LAYER_IDS.DEEPSTATE_FILL;
            const lineLayerId = LAYER_IDS.DEEPSTATE_LINE;

            if (map.getLayer(fillLayerId)) map.removeLayer(fillLayerId);
            if (map.getLayer(lineLayerId)) map.removeLayer(lineLayerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            if (!enabled || !date || !allDeepstateData.features) return;

            const features = allDeepstateData.features.filter(f =>
                (f.properties?.date || '') === date
            );

            if (features.length === 0) return;

            map.addSource(sourceId, {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: features
                }
            });

            // Capa de relleno
            map.addLayer({
                id: fillLayerId,
                type: 'fill',
                source: sourceId,
                paint: {
                    'fill-color': fillColor,
                    'fill-opacity': fillOpacity,
                    'fill-outline-color': lineColor,
                    'fill-outline-width': 1
                }
            });

            // Capa de borde
            map.addLayer({
                id: lineLayerId,
                type: 'line',
                source: sourceId,
                paint: {
                    'line-color': lineColor,
                    'line-width': 1.5,
                    'line-opacity': lineOpacity
                }
            });

            reorderLayers();
        }

        // ============================================================
        // 6. MAPA BASE
        // ============================================================

        function updateBaseMap() {
            const selected = document.getElementById('map-style-selector').value;

            if (map.getLayer(LAYER_IDS.BASE)) map.removeLayer(LAYER_IDS.BASE);
            if (map.getSource(SOURCE_IDS.BASE)) map.removeSource(SOURCE_IDS.BASE);

            let tiles = [];
            let attribution = '';

            switch(selected) {
                case 'satellite':
                    tiles = ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'];
                    attribution = '© Esri, Maxar, Earthstar Geographics';
                    break;
                case 'osm':
                    tiles = ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'];
                    attribution = '© OpenStreetMap contributors';
                    break;
                case 'topo':
                    tiles = ['https://tile.opentopomap.org/{z}/{x}/{y}.png'];
                    attribution = '© OpenTopoMap';
                    break;
                default:
                    tiles = ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'];
                    attribution = '© OpenStreetMap contributors';
            }

            map.addSource(SOURCE_IDS.BASE, {
                type: 'raster',
                tiles: tiles,
                tileSize: 256,
                attribution: attribution
            });

            map.addLayer({
                id: LAYER_IDS.BASE,
                type: 'raster',
                source: SOURCE_IDS.BASE
            });

            reorderLayers();
        }

        // ============================================================
        // 7. TERRENO E INCLINACIÓN
        // ============================================================

        function updateTerrain() {
            const enabled = document.getElementById('chk-terrain').checked;
            const pitch = parseInt(document.getElementById('pitch-control').value);

            if (enabled) {
                if (!map.getSource('terrainSource')) {
                    map.addSource('terrainSource', {
                        type: 'raster-dem',
                        tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
                        tileSize: 256,
                        encoding: 'terrarium',
                        maxzoom: 14
                    });
                }
                map.setTerrain({ source: 'terrainSource', exaggeration: 2.0 });
                map.setPitch(pitch);
            } else {
                map.setTerrain(null);
                map.setPitch(0);
            }
        }

        // ============================================================
        // 8. CONECTAR CONTROLES
        // ============================================================

        // Incendios
        document.getElementById('chk-fires').addEventListener('change', updateFires);
        document.getElementById('opacity-fires').addEventListener('input', function() {
            document.getElementById('val-opacity-fires').textContent = (this.value / 100).toFixed(2);
            updateFires();
        });
        document.getElementById('color-fires').addEventListener('input', updateFires);

        // DeepState
        document.getElementById('chk-deepstate').addEventListener('change', updateDeepstate);
        document.getElementById('deepstate-date').addEventListener('change', function() {
            currentDeepstateDate = this.value;
            updateDeepstate();
        });
        document.getElementById('color-deepstate-fill').addEventListener('input', updateDeepstate);
        document.getElementById('color-deepstate-line').addEventListener('input', updateDeepstate);
        document.getElementById('opacity-ds-fill').addEventListener('input', function() {
            document.getElementById('val-opacity-ds-fill').textContent = (this.value / 100).toFixed(2);
            updateDeepstate();
        });
        document.getElementById('opacity-ds-line').addEventListener('input', function() {
            document.getElementById('val-opacity-ds-line').textContent = (this.value / 100).toFixed(2);
            updateDeepstate();
        });

        // Mapa base
        document.getElementById('map-style-selector').addEventListener('change', function() {
            updateBaseMap();
            // Reaplicar orden después de cambiar el mapa base
            setTimeout(reorderLayers, 100);
        });
        document.getElementById('chk-terrain').addEventListener('change', updateTerrain);
        document.getElementById('pitch-control').addEventListener('input', function() {
            document.getElementById('val-pitch').textContent = this.value;
            updateTerrain();
        });

        // Orden de capas
        document.querySelectorAll('.layer-order button').forEach(btn => {
            btn.addEventListener('click', function() {
                const layer = this.dataset.layer;
                // Mover esta capa al frente
                const orderMap = {
                    'base': 'BASE',
                    'deepstate': 'DEEPSTATE_FILL',
                    'fires': 'FIRES'
                };
                const key = orderMap[layer];
                if (!key) return;

                // Eliminar de la lista y poner al final
                const index = layerOrder.indexOf(key);
                if (index > -1) {
                    layerOrder.splice(index, 1);
                }
                layerOrder.push(key);

                // Actualizar botones
                document.querySelectorAll('.layer-order button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                // Reordenar capas
                reorderLayers();
            });
        });

        // ============================================================
        // 9. INICIAR
        // ============================================================

        map.on('load', function() {
            // Mapa base por defecto (OSM)
            updateBaseMap();
            
            // Cargar datos
            loadFires();
            loadDeepstate();
            
            // Terreno e inclinación
            updateTerrain();
            
            console.log('✅ Visor 3D con controles listo');
        });
    </script>

</body>
</html>
