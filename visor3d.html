<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Semiesferas</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #0d1117; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 14px; }
        #debug { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.9); color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-width: 350px; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🌍 Visor 3D - Semiesferas</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 20) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 20).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO...');

        // ============================================================
        // 1. MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // 2. THREE.JS - CÁMARA ORTOGRÁFICA
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;
        let fireMeshes = [];
        let firesData = [];

        function initThree() {
            if (threeReady) return;
            logDebug('🔧 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            scene = new THREE.Scene();

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(
                -aspect * 500,
                aspect * 500,
                500,
                -500,
                0.1,
                10000
            );
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                const aspect2 = w / h;
                camera.left = -aspect2 * 500;
                camera.right = aspect2 * 500;
                camera.top = 500;
                camera.bottom = -500;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            loadFires();
            animate(0);
        }

        // ============================================================
        // 3. CONVERTIR COORDENADAS A PÍXELES DE PANTALLA
        // ============================================================
        function lngLatToScreen(lng, lat) {
            const point = map.project(new maplibregl.LngLat(lng, lat));
            const w = window.innerWidth;
            const h = window.innerHeight;

            // Convertir a coordenadas Three.js (centro en 0,0)
            const x = (point.x / w) * 1000 - 500;
            const y = -((point.y / h) * 1000 - 500);

            return { x, y };
        }

        // ============================================================
        // 4. OBTENER TAMAÑO EN PANTALLA
        // ============================================================
        function getScreenSize(frp) {
            const t = Math.min(frp / 500, 1);
            return 15 + t * 50;
        }

        // ============================================================
        // 5. CENTROIDE
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // 6. CREAR SEMIESFERA EN PANTALLA
        // ============================================================
        function createScreenSphere(lon, lat, frp) {
            const pos = lngLatToScreen(lon, lat);
            const radius = getScreenSize(frp);

            const t = Math.min(frp / 500, 1);
            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();
            group.position.set(pos.x, pos.y, 0);

            // LOG solo para los primeros
            if (fireMeshes.length < 3) {
                logDebug(`📍 Fuego en (${lon.toFixed(2)}, ${lat.toFixed(2)}) → pantalla (${pos.x.toFixed(0)}, ${pos.y.toFixed(0)}) radio: ${radius}`);
            }

            // Semiesfera
            const geom = new THREE.SphereGeometry(radius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 1.0,
                transparent: true,
                opacity: 0.95,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 40
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(0, 0, radius * 0.8);
            group.add(sphere);

            // Glow
            const glowGeom = new THREE.SphereGeometry(radius * 2.5, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.3)}, ${Math.round(b * 0.15)})`),
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.set(0, 0, radius * 0.8);
            group.add(glow);

            // Núcleo
            const coreGeom = new THREE.SphereGeometry(radius * 0.3, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.set(0, 0, radius * 0.8 + radius * 0.2);
            group.add(core);

            group.userData = { frp, lon, lat, radius };

            return group;
        }

        // ============================================================
        // 7. ACTUALIZAR POSICIONES EN PANTALLA (CUANDO SE MUEVE EL MAPA)
        // ============================================================
        function updatePositions() {
            if (!threeReady || fireMeshes.length === 0) return;

            fireMeshes.forEach(group => {
                const { lon, lat } = group.userData;
                const pos = lngLatToScreen(lon, lat);
                group.position.set(pos.x, pos.y, 0);
            });
        }

        // ============================================================
        // 8. ACTUALIZAR INCENDIOS
        // ============================================================
        function updateFires() {
            if (!threeReady) return;

            logDebug('🔄 Actualizando incendios...');

            fireMeshes.forEach(obj => {
                scene.remove(obj);
                obj.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            fireMeshes = [];

            if (firesData.length === 0) {
                logDebug('⚠️ No hay datos');
                return;
            }

            const toRender = firesData.slice(0, 50);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const group = createScreenSphere(lon, lat, frp);
                    scene.add(group);
                    fireMeshes.push(group);
                } catch (e) {
                    // Silencioso
                }
            });

            logDebug(`✅ ${fireMeshes.length} semiesferas en pantalla`);
        }

        // ============================================================
        // 9. CARGAR DATOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';

        function loadFires() {
            logDebug('📡 Cargando incendios...');

            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    firesData = data.features || [];
                    logDebug(`✅ ${firesData.length} incendios`);
                    setTimeout(updateFires, 200);
                })
                .catch(e => {
                    logDebug('❌ Error: ' + e.message);
                    createTestData();
                });
        }

        function createTestData() {
            logDebug('🔥 Usando datos de prueba...');
            const testFires = [
                [30.5234, 50.4501, 400],
                [30.6, 50.5, 300],
                [30.4, 50.4, 200],
                [30.7, 50.3, 150],
                [30.3, 50.6, 100],
                [30.8, 50.6, 250],
                [30.2, 50.3, 180]
            ];
            firesData = testFires.map(([lon, lat, frp]) => ({
                properties: { frp },
                geometry: {
                    coordinates: [[[lon-0.02, lat-0.02], [lon+0.02, lat-0.02], [lon+0.02, lat+0.02], [lon-0.02, lat+0.02], [lon-0.02, lat-0.02]]]
                }
            }));
            setTimeout(updateFires, 200);
        }

        // ============================================================
        // 10. ANIMACIÓN
        // ============================================================
        let lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            // Actualizar posiciones en pantalla
            updatePositions();

            const delta = lastTime ? (time - lastTime) / 1000 : 0;
            lastTime = time;

            const timeNow = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                group.rotation.y += delta * 0.3;

                const pulse = Math.sin(timeNow * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // 11. INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            logDebug('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        // Actualizar posiciones al mover el mapa
        map.on('move', () => {
            if (threeReady) {
                updatePositions();
            }
        });

        setTimeout(() => {
            if (!threeReady) {
                logDebug('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
