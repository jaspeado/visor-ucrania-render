<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visor Ucrania 3D</title>
<script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  #map { width: 100%; height: 100vh; }
  #info {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.75); color: #fff;
    padding: 10px 16px; border-radius: 8px;
    font: 13px/1.5 Arial, sans-serif;
    z-index: 10; pointer-events: none;
    max-width: 260px;
  }
  #legend {
    position: absolute; bottom: 30px; left: 12px;
    background: rgba(0,0,0,0.75); color: #fff;
    padding: 10px 14px; border-radius: 8px;
    font: 12px Arial, sans-serif; z-index: 10;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-color { width: 20px; height: 14px; border-radius: 3px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="map"></div>
<div id="info">
  🌍 <strong>Visor Ucrania 3D</strong><br>
  <span id="status">⏳ Cargando...</span>
</div>
<div id="legend">
  <div class="legend-item"><div class="legend-color" style="background:#cc2200;opacity:0.7"></div> Territorio ocupado</div>
  <div class="legend-item"><div class="legend-color" style="background:#FF6600"></div> 🔥 Incendios (FRP > 10 MW)</div>
</div>

<script>
const DEEPSTATE_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/deepstate_actual.geojson';
const FIRES_URL     = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';

// ── MAPA ──────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [32.0, 48.5],
  zoom: 5.5,
  pitch: 0,        // SIN pitch para que fill sea siempre visible
  bearing: 0,
  antialias: true,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── CARGAR DATOS ──────────────────────────────────────────────────────────
map.on('load', async function () {

  // 1. DEEPSTATE (territorios ocupados)
  try {
    const res = await fetch(DEEPSTATE_URL);
    const geojson = await res.json();

    map.addSource('deepstate', {
      type: 'geojson',
      data: geojson,
    });

    // ✅ RELLENO — sin fill-outline-width (no existe en MapLibre)
    map.addLayer({
      id: 'deepstate-fill',
      type: 'fill',
      source: 'deepstate',
      paint: {
        'fill-color': '#cc2200',
        'fill-opacity': 0.45,
        // fill-outline-color SÍ existe, fill-outline-width NO
        'fill-outline-color': 'rgba(0,0,0,0)',
      }
    });

    // ✅ BORDE GRUESO — capa separada de tipo 'line' (más control)
    map.addLayer({
      id: 'deepstate-line',
      type: 'line',
      source: 'deepstate',
      paint: {
        'line-color': '#ffffff',
        'line-width': 2.5,
        'line-opacity': 0.9,
      }
    });

    setStatus(`✅ Frente cargado`);
  } catch (e) {
    setStatus('❌ Error cargando frente: ' + e.message);
    console.error(e);
  }

  // 2. INCENDIOS FIRMS
  try {
    const res2 = await fetch(FIRES_URL);
    const fires = await res2.json();

    // Filtrar: últimas 48h y FRP > 10
    const ahora = Date.now();
    const limite = ahora - 48 * 60 * 60 * 1000;
    fires.features = fires.features.filter(f => {
      const d = new Date(f.properties.acq_date).getTime();
      return d >= limite && (f.properties.frp || 0) > 10;
    });

    map.addSource('fires', {
      type: 'geojson',
      data: fires,
    });

    map.addLayer({
      id: 'fires-circle',
      type: 'circle',
      source: 'fires',
      paint: {
        'circle-radius': [
          'interpolate', ['linear'], ['get', 'frp'],
          10, 4,
          100, 12,
          500, 22,
        ],
        'circle-color': [
          'interpolate', ['linear'], ['get', 'frp'],
          10,  '#ffcc00',
          100, '#ff6600',
          500, '#ff0000',
        ],
        'circle-opacity': 0.85,
        'circle-stroke-color': '#ffffff',
        'circle-stroke-width': 1,
      }
    });

    const n = fires.features.length;
    setStatus(`✅ ${n} incendios | Frente cargado`);
  } catch (e) {
    console.warn('Fires error:', e);
  }

  // 3. POPUP al hacer clic en incendio
  map.on('click', 'fires-circle', function (e) {
    const p = e.features[0].properties;
    new maplibregl.Popup()
      .setLngLat(e.lngLat)
      .setHTML(`
        <strong>🔥 Incendio FIRMS</strong><br>
        FRP: <b>${p.frp} MW</b><br>
        Fecha: ${p.acq_date}<br>
        Satélite: ${p.satellite || 'N/A'}
      `)
      .addTo(map);
  });

  map.on('mouseenter', 'fires-circle', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'fires-circle', () => map.getCanvas().style.cursor = '');
});
</script>
</body>
</html>
