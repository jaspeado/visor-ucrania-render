<!DOCTYPE html>
<html>
<head>
    <title>Visor 3D - Proyección en Pantalla</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: relative; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px; border-radius: 10px; font-family: monospace; font-size: 12px; }
        #debug { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.9); color: #0f0; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 10px; max-width: 300px; max-height: 150px; overflow: auto; }
    </style>
</head>
<body>

    <div id="map">
        <div id="three-container"></div>
    </div>
    <div id="info">🔥 Visor 3D - Proyección en pantalla</div>
    <div id="debug">Cargando...</div>

    <script>
        const debugEl = document.getElementById('debug');
        function logDebug(msg) {
            console.log(msg);
            debugEl.innerHTML = msg + '<br>' + debugEl.innerHTML;
            if (debugEl.innerHTML.split('<br>').length > 15) {
                debugEl.innerHTML = debugEl.innerHTML.split('<br>').slice(0, 15).join('<br>');
            }
        }

        logDebug('🚀 INICIANDO...');

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [32.0, 48.5],
            zoom: 6,
            pitch: 60,
            antialias: true
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // THREE.JS
        // ============================================================
        let scene, camera, renderer;
        let threeReady = false;
        let fireMeshes = [];
        let firesData = [];

        function initThree() {
            if (threeReady) return;
            logDebug('🔄 Inicializando Three.js...');

            const container = document.getElementById('three-container');

            // Escena SIN fondo (transparente)
            scene = new THREE.Scene();

            // Cámara ORTOGRÁFICA (coordenadas de pantalla)
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 1000;
            camera = new THREE.OrthographicCamera(
                -frustumSize * aspect / 2,  // left
                frustumSize * aspect / 2,   // right
                frustumSize / 2,            // top
                -frustumSize / 2,           // bottom
                0.1,                        // near
                10000                       // far
            );
            camera.position.set(0, 0, 1000);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xff8844, 0.5);
            light2.position.set(-1, 0.5, -1);
            scene.add(light2);

            threeReady = true;
            logDebug('✅ Three.js listo');

            window.addEventListener('resize', () => {
                if (!threeReady) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                const aspect2 = w / h;
                const fs = 1000;
                camera.left = -fs * aspect2 / 2;
                camera.right = fs * aspect2 / 2;
                camera.top = fs / 2;
                camera.bottom = -fs / 2;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            loadFires();
            animate();
        }

        // ============================================================
        // CALCULAR CENTROIDE
        // ============================================================
        function getPolygonCenter(coords) {
            const ring = coords[0] || coords;
            let lon = 0, lat = 0;
            const count = ring.length;
            for (let i = 0; i < count; i++) {
                lon += ring[i][0];
                lat += ring[i][1];
            }
            return [lon / count, lat / count];
        }

        // ============================================================
        // CONVERTIR COORDENADAS DEL MAPA A PANTALLA
        // ============================================================
        function lngLatToScreen(lng, lat) {
            // Proyectar punto en el mapa
            const point = map.project(new maplibregl.LngLat(lng, lat));
            
            // Convertir a coordenadas de Three.js (centro en 0,0)
            const x = (point.x / window.innerWidth) * 1000 - 500;
            const y = -(point.y / window.innerHeight) * 1000 + 500;
            
            return { x, y };
        }

        // ============================================================
        // OBTENER TAMAÑO EN PANTALLA SEGÚN ZOOM
        // ============================================================
        function getSizeInScreen(frp, zoom) {
            // Tamaño base en píxeles
            const t = Math.min(frp / 500, 1);
            const baseSize = 15 + t * 40;
            
            // Ajustar por zoom: más grande cuando más zoom
            const zoomFactor = Math.pow(1.2, zoom - 5);
            return baseSize * Math.min(zoomFactor, 3);
        }

        // ============================================================
        // CREAR SEMIESFERA (en coordenadas de pantalla)
        // ============================================================
        function createScreenSphere(lon, lat, frp) {
            const pos = lngLatToScreen(lon, lat);
            const zoom = map.getZoom();
            const radius = getSizeInScreen(frp, zoom);

            const t = Math.min(frp / 500, 1);
            const r = 255;
            const g = Math.round(255 * (1 - t * 0.9));
            const b = Math.round(80 * (1 - t * 0.8));

            const group = new THREE.Group();

            // Semiesfera 3D (en pantalla)
            const geom = new THREE.SphereGeometry(radius, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2);
            const mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(`rgb(${r}, ${g}, ${b})`),
                emissive: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.6)}, ${Math.round(b * 0.3)})`),
                emissiveIntensity: 0.6 + t * 0.8,
                transparent: true,
                opacity: 0.85 + t * 0.15,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                shininess: 30
            });
            const sphere = new THREE.Mesh(geom, mat);
            sphere.position.set(pos.x, pos.y, radius * 0.8);
            group.add(sphere);

            // Glow
            const glowGeom = new THREE.SphereGeometry(radius * 2.5, 12, 6, 0, Math.PI * 2, 0, Math.PI / 2);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(${r}, ${Math.round(g * 0.4)}, ${Math.round(b * 0.2)})`),
                transparent: true,
                opacity: 0.12 + t * 0.12,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            glow.position.copy(sphere.position);
            group.add(glow);

            // Núcleo
            const coreGeom = new THREE.SphereGeometry(radius * 0.4, 12, 6, 0, Math.PI * 2, 0, Math.PI / 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`rgb(255, ${Math.min(g + 80, 255)}, ${Math.min(b + 80, 255)})`),
                transparent: true,
                opacity: 0.7 + t * 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.position.copy(sphere.position);
            core.position.y += radius * 0.2;
            group.add(core);

            group.userData = { frp, lon, lat, radius, screenX: pos.x, screenY: pos.y };

            return group;
        }

        // ============================================================
        // ACTUALIZAR INCENDIOS
        // ============================================================
        function updateFires() {
            if (!threeReady) return;

            const enabled = document.getElementById('chk-fires').checked;
            const frpMin = parseInt(document.getElementById('frp-slider').value) || 0;

            fireMeshes.forEach(obj => {
                scene.remove(obj);
                obj.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
            });
            fireMeshes = [];

            if (!enabled || firesData.length === 0) {
                document.getElementById('stats-fires').textContent = '🔥 0';
                return;
            }

            const filtered = firesData.filter(f => {
                const frp = f.properties?.frp || 0;
                return frp >= frpMin;
            });

            document.getElementById('stats-fires').textContent = '🔥 ' + filtered.length;

            const toRender = filtered.slice(0, 200);

            toRender.forEach(f => {
                try {
                    const frp = f.properties?.frp || 10;
                    const coords = f.geometry.coordinates;
                    const [lon, lat] = getPolygonCenter(coords);

                    const group = createScreenSphere(lon, lat, frp);
                    scene.add(group);
                    fireMeshes.push(group);
                } catch (e) {
                    // Silencioso
                }
            });

            logDebug(`✅ ${fireMeshes.length} semiesferas en pantalla`);
        }

        // ============================================================
        // ACTUALIZAR POSICIONES EN PANTALLA (cuando se mueve el mapa)
        // ============================================================
        function updateScreenPositions() {
            if (!threeReady || fireMeshes.length === 0) return;

            const zoom = map.getZoom();
            
            fireMeshes.forEach(group => {
                const { lon, lat, frp } = group.userData;
                const pos = lngLatToScreen(lon, lat);
                const radius = getSizeInScreen(frp, zoom);
                
                // Actualizar posición
                group.position.set(pos.x, pos.y, 0);
                
                // Actualizar tamaño de las geometrías
                group.children.forEach(child => {
                    if (child.geometry && child.geometry.type === 'SphereGeometry') {
                        // Recrear geometría con nuevo radio
                        const oldGeom = child.geometry;
                        const newGeom = new THREE.SphereGeometry(radius, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2);
                        child.geometry = newGeom;
                        oldGeom.dispose();
                    }
                    if (child.position) {
                        child.position.x = 0;
                        child.position.y = 0;
                        child.position.z = radius * 0.8;
                    }
                });
                
                // Guardar nuevo radio
                group.userData.radius = radius;
                group.userData.screenX = pos.x;
                group.userData.screenY = pos.y;
            });
        }

        // ============================================================
        // CARGAR DATOS
        // ============================================================
        const FIRMS_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires_polygons.geojson';

        function loadFires() {
            logDebug('📡 Cargando incendios...');
            
            fetch(FIRMS_URL)
                .then(r => r.json())
                .then(data => {
                    firesData = data.features || [];
                    logDebug(`✅ ${firesData.length} incendios`);
                    updateFires();
                })
                .catch(e => {
                    logDebug('❌ Error: ' + e.message);
                });
        }

        // ============================================================
        // ANIMACIÓN
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            if (!threeReady) return;

            // Actualizar posiciones en pantalla
            updateScreenPositions();

            const time = Date.now() / 1000;
            fireMeshes.forEach((group, index) => {
                group.rotation.y += 0.01;
                const pulse = Math.sin(time * 0.5 + index * 0.3) * 0.06 + 0.94;
                group.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        if (!child.userData?.baseOpacity) {
                            child.userData = child.userData || {};
                            child.userData.baseOpacity = child.material.opacity;
                        }
                        child.material.opacity = child.userData.baseOpacity * pulse;
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // ============================================================
        // CONTROLES
        // ============================================================
        document.getElementById('chk-fires').addEventListener('change', updateFires);
        document.getElementById('frp-slider').addEventListener('input', function() {
            document.getElementById('val-frp').textContent = this.value;
            updateFires();
        });

        // Actualizar posiciones al mover el mapa
        map.on('move', () => {
            if (threeReady) {
                updateScreenPositions();
            }
        });

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        map.on('load', function() {
            logDebug('🗺️ Mapa cargado');
            setTimeout(initThree, 500);
        });

        if (map.loaded()) {
            logDebug('ℹ️ Mapa ya cargado');
            setTimeout(initThree, 500);
        }

        setTimeout(() => {
            if (!threeReady) {
                logDebug('⏰ Forzando inicio...');
                initThree();
            }
        }, 3000);

        logDebug('🚀 Visor iniciado');
    </script>
</body>
</html>
