<!DOCTYPE html>
<html lang="es">
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; font-family: 'Inter', sans-serif; }
  #map { width: 100%; height: 100vh; }

  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(13,17,23,0.92); border: 1px solid #30363d; border-radius: 10px;
    padding: 14px 16px; min-width: 220px; max-width: 220px;
    font-size: 12px; color: #e6edf3; transition: none;
  }
  #panel.minimized { min-width: auto; max-width: auto; padding-bottom: 0; }

  .window-header {
    display: flex; align-items: center; justify-content: space-between;
    background: #161b22; padding: 6px 8px 6px 10px; cursor: grab;
    user-select: none; border-bottom: 1px solid #21262d;
    border-radius: 8px 8px 0 0; margin: -14px -16px 10px -16px;
  }
  .window-header:active { cursor: grabbing; }
  #legend-regions .window-header { margin: -8px -12px 8px -12px; }

  .window-title { font-size: 10px; font-weight: 600; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.04em; }
  .window-body.minimized { display: none; }
  #panel.minimized, #legend-regions.minimized { width: auto; min-width: 140px; max-height: none; padding-bottom: 0; }

  .control-group { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #21262d; }
  .control-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .control-group label { display: block; font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 3px; }
  .control-group select { width: 100%; padding: 4px 6px; background: #1c2333; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; font-size: 11px; font-family: 'Inter', sans-serif; cursor: pointer; outline: none; }
  .control-group select:focus { border-color: #58a6ff; }
  .control-group input[type="range"] { width: 100%; margin: 4px 0; accent-color: #58a6ff; background: #30363d; height: 3px; border-radius: 2px; cursor: pointer; }
  .control-group input[type="color"] { width: 24px; height: 24px; border: 2px solid #30363d; border-radius: 4px; padding: 0; cursor: pointer; background: transparent; }
  .checkbox-group { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .checkbox-group input[type="checkbox"] { accent-color: #58a6ff; width: 14px; height: 14px; cursor: pointer; }
  .checkbox-group label { text-transform: none !important; font-size: 11px !important; color: #e6edf3 !important; font-weight: 400 !important; letter-spacing: 0 !important; margin-bottom: 0 !important; }
  .color-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .color-row span { font-size: 10px; color: #8b949e; }
  .slider-value { float: right; font-size: 10px; color: #58a6ff; font-weight: 500; }
  .stats-row { display: flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-top: 4px; padding-top: 8px; border-top: 1px solid #21262d; font-weight: 500; }

  #legend-regions {
    position: absolute; bottom: 80px; right: 12px; z-index: 1000;
    background: rgba(13,17,23,0.92); border: 1px solid #30363d; border-radius: 10px;
    padding: 8px 12px; color: #e6edf3; font-size: 10px;
    min-width: 120px; max-width: 180px; max-height: 200px;
    display: flex; flex-direction: column; pointer-events: auto; transition: none;
  }
  #legend-regions.minimized { min-width: auto; max-width: auto; max-height: none; padding-bottom: 0; }
  #region-list { overflow-y: auto; flex-grow: 1; max-height: 150px; }
  #region-list::-webkit-scrollbar { width: 3px; }
  #region-list::-webkit-scrollbar-track { background: #21262d; border-radius: 4px; }
  #region-list::-webkit-scrollbar-thumb { background: #58a6ff; border-radius: 4px; }
  .region-item { display: flex; justify-content: space-between; padding: 2px 4px; border-bottom: 1px solid #21262d; font-size: 10px; cursor: pointer; border-radius: 4px; transition: background 0.15s ease; }
  .region-item:last-child { border-bottom: none; }
  .region-item:hover { background: rgba(88,166,255,0.1); }
  .region-item.active { background: rgba(88,166,255,0.15); border-left: 2px solid #58a6ff; }
  .region-item .count { color: #58a6ff; font-weight: 600; }
  .region-item .region-name { color: #e6edf3; }
  .region-item.all-regions { border-bottom: 1px solid #58a6ff !important; margin-bottom: 2px; }
  .region-item.all-regions .region-name { color: #58a6ff; font-weight: 600; }

  .maplibregl-popup-content { padding: 0 !important; overflow: hidden; background: #0d1117 !important; border: 1px solid #30363d !important; border-radius: 8px !important; box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important; min-width: 200px !important; font-family: 'Inter', sans-serif !important; }
  .maplibregl-popup-tip { border-top-color: #30363d !important; }
  .maplibregl-popup-close-button { display: none !important; }
  .maplibregl-popup { pointer-events: auto !important; }

  .popup-header { display: flex; align-items: center; justify-content: space-between; background: #161b22; padding: 6px 8px 6px 10px; cursor: grab; user-select: none; border-bottom: 1px solid #21262d; border-radius: 8px 8px 0 0; pointer-events: auto !important; }
  .popup-header:active { cursor: grabbing; }
  .popup-title { font-size: 11px; font-weight: 600; color: #ff6600; }
  .popup-controls { display: flex; gap: 4px; }
  .popup-btn { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; background: #21262d; border-radius: 4px; color: #e6edf3; font-size: 12px; cursor: pointer; line-height: 1; border: none; transition: background 0.15s; pointer-events: auto !important; }
  .popup-btn:hover { background: #30363d; }
  .popup-body { padding: 8px 12px; font-size: 11px; line-height: 1.5; color: #e6edf3; }
  .popup-body.minimized { display: none; }

  #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(13,17,23,0.85); padding: 6px 18px; border-radius: 20px; border: 1px solid #30363d; color: #8b949e; font-size: 11px; pointer-events: none; white-space: nowrap; }
  #attribution { position: absolute; bottom: 60px; left: 12px; z-index: 1000; background: rgba(13,17,23,0.7); padding: 4px 10px; border-radius: 12px; border: 1px solid #30363d; color: #8b949e; font-size: 9px; pointer-events: none; opacity: 0.7; transition: opacity 0.3s; }
  #attribution:hover { opacity: 1; }

  @media (max-width: 640px) {
    #panel { min-width: 180px; max-width: 180px; padding: 10px 12px; top: 60px; left: 6px; }
    #panel .window-header { margin: -10px -12px 8px -12px; }
    #legend-regions { bottom: 70px; right: 6px; min-width: 90px; max-width: 130px; padding: 6px 8px; }
    #legend-regions .window-header { margin: -6px -8px 6px -8px; }
    #region-list { max-height: 120px; }
    .region-item { font-size: 9px; padding: 1px 3px; }
    #info { font-size: 10px; padding: 4px 12px; }
    #attribution { bottom: 50px; left: 6px; font-size: 8px; }
    .maplibregl-popup-content { min-width: 160px !important; }
    .popup-body { font-size: 10px !important; padding: 6px 10px !important; }
  }
</style>
</head>
<body>

<div id="panel">
  <div class="window-header" id="panel-header">
    <span class="window-title">⚙️ Controles</span>
    <div class="popup-controls"><span class="popup-btn" id="panel-min">─</span></div>
  </div>
  <div class="window-body" id="panel-body">
    <div class="control-group">
      <label>🗺️ Mapa base</label>
      <select id="map-style-selector">
        <option value="satellite">🛰️ Satélite</option>
        <option value="dark" selected>🌍 CartoDB Dark</option>
        <option value="osm">🌍 OpenStreetMap</option>
        <option value="topo">🗺️ Topográfico</option>
      </select>
    </div>
    <div class="control-group">
      <label>⏱️ Rango temporal</label>
      <select id="time-range-selector">
        <option value="72">Últimas 72 horas</option>
        <option value="48" selected>Últimas 48 horas</option>
        <option value="24">Últimas 24 horas</option>
      </select>
    </div>
    <div class="control-group">
      <div class="checkbox-group">
        <input type="checkbox" id="chk-deepstate" checked>
        <label for="chk-deepstate">🟥 Línea del frente</label>
      </div>
      <div class="color-row">
        <input type="color" id="color-fill" value="#cc2200">
        <span>Relleno</span>
        <span style="margin-left:auto;">Opacidad <span class="slider-value" id="val-opacity-fill">0.45</span></span>
      </div>
      <input type="range" id="opacity-fill" min="0" max="100" value="45">
      <div class="color-row">
        <input type="color" id="color-line" value="#ffffff">
        <span>Borde</span>
        <span style="margin-left:auto;">Opacidad <span class="slider-value" id="val-opacity-line">0.90</span></span>
      </div>
      <input type="range" id="opacity-line" min="0" max="100" value="90">
    </div>
    <div class="control-group">
      <div class="checkbox-group">
        <input type="checkbox" id="chk-fires" checked>
        <label for="chk-fires">🔥 Incendios 3D</label>
      </div>
      <label>FRP mínimo <span class="slider-value" id="val-frp">10</span></label>
      <input type="range" id="frp-slider" min="0" max="100" value="10">
    </div>
    <div class="control-group">
      <div class="checkbox-group">
        <input type="checkbox" id="chk-terrain" checked>
        <label for="chk-terrain">🏔️ Terreno 3D</label>
      </div>
      <label>Inclinación <span class="slider-value" id="val-pitch">45</span></label>
      <input type="range" id="pitch-slider" min="0" max="85" value="45">
    </div>
    <div class="stats-row"><span id="stats-fires">🔥 0</span></div>
  </div>
</div>

<div id="legend-regions">
  <div class="window-header" id="legend-header">
    <span class="window-title">🔥 Focos por región</span>
    <div class="popup-controls"><span class="popup-btn" id="legend-min">─</span></div>
  </div>
  <div class="window-body" id="legend-body">
    <div id="region-list"><div class="region-item">Cargando...</div></div>
  </div>
</div>

<div id="info">🌍 Visor 3D Ucrania · Clic en un incendio para detalles</div>
<div id="attribution"><span id="attribution-text">🌍 Fuente: CartoDB (Dark Matter)</span></div>
<div id="map"></div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const DEEPSTATE_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/deepstate_actual.geojson';
const FIRMS_URL     = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/fires.geojson';

let deepstateData        = null;
let firesData            = [];
let currentFiresFiltered = [];
let selectedRegion       = null;
let activePopup          = null;
let deckOverlay          = null;
let animFrameId          = null;
let pulsePhase           = 0;       // 0..1, ciclo de 2.5s
let lastActiveFeatures   = [];      // referencia estable para animación

// ============================================================
// MAPA
// ============================================================
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [32.0, 48.5], zoom: 5.5, pitch: 45,
  renderWorldCopies: false, antialias: true, preserveDrawingBuffer: true
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

// ============================================================
// MALLA SEMIESFERA (generada una sola vez)
// ============================================================
function buildHemisphereMesh() {
  const RINGS = 14, SEGS = 28;
  const pos = [], nor = [], idx = [];

  for (let r = 0; r <= RINGS; r++) {
    const phi = (r / RINGS) * (Math.PI / 2);
    const sp = Math.sin(phi), cp = Math.cos(phi);
    for (let s = 0; s <= SEGS; s++) {
      const th = (s / SEGS) * Math.PI * 2;
      const x = Math.cos(th) * sp, y = Math.sin(th) * sp, z = cp;
      pos.push(x, y, z); nor.push(x, y, z);
    }
  }
  // Disco base
  const ctrIdx = pos.length / 3;
  pos.push(0, 0, 0); nor.push(0, 0, -1);
  const diskStart = ctrIdx + 1;
  for (let s = 0; s <= SEGS; s++) {
    const th = (s / SEGS) * Math.PI * 2;
    pos.push(Math.cos(th), Math.sin(th), 0); nor.push(0, 0, -1);
  }
  // Cara cúpula
  for (let r = 0; r < RINGS; r++)
    for (let s = 0; s < SEGS; s++) {
      const a = r*(SEGS+1)+s, b = a+SEGS+1;
      idx.push(a,b,a+1); idx.push(b,b+1,a+1);
    }
  // Disco
  for (let s = 0; s < SEGS; s++)
    idx.push(ctrIdx, diskStart+s+1, diskStart+s);

  return {
    attributes: {
      POSITION: { value: new Float32Array(pos), size: 3 },
      NORMAL:   { value: new Float32Array(nor), size: 3 }
    },
    indices: { value: new Uint32Array(idx), size: 1 },
    topology: 'triangle-list',
    vertexCount: idx.length
  };
}
const HEMISPHERE_MESH = buildHemisphereMesh();

// ============================================================
// HELPERS DE COLOR Y TAMAÑO
// ============================================================
// Radio base en metros (muy pequeño)
function frpRadius(frp) {
  return Math.max(80, Math.min(Math.sqrt(frp) * 60, 700));
}

// Color núcleo — rampa amarillo→naranja→rojo según FRP, alpha ~90 (>50% transparente)
function coreColor(frp) {
  if (frp >= 300) return [255,   0,   0,  95];   // rojo puro — muy intenso
  if (frp >= 100) return [255,  80,   0,  90];   // rojo-naranja
  if (frp >=  40) return [255, 150,   0,  85];   // naranja
  return                  [255, 220,   0,  80];   // amarillo — baja intensidad
}

// Color aura — mismo gradiente pero muy suave
function glowColor(frp) {
  if (frp >= 300) return [255,   0,   0,  30];
  if (frp >= 100) return [255,  80,   0,  24];
  if (frp >=  40) return [255, 150,   0,  18];
  return                  [255, 220,   0,  14];
}

// Color anillo de pulso
function ringColor(frp, alpha) {
  if (frp >= 200) return [255,  50,   0, alpha];
  if (frp >=  80) return [255, 100,   0, alpha];
  return                  [255, 150,   0, alpha];
}

// ============================================================
// DECK.GL — init
// ============================================================
function initDeckGL() {
  deckOverlay = new deck.MapboxOverlay({ interleaved: false, layers: [] });
  map.addControl(deckOverlay);
}

// ============================================================
// DECK.GL — actualizar capas (llamado cada frame para el pulso)
// ============================================================
function renderDeckLayers(features) {
  if (!deckOverlay || !features || features.length === 0) {
    if (deckOverlay) deckOverlay.setProps({ layers: [] });
    return;
  }

  // ── Capa 3: cúpula sólida (núcleo brillante) ──────────────
  const coreLayer = new deck.SimpleMeshLayer({
    id: 'fires-core',
    data: features,
    mesh: HEMISPHERE_MESH,
    getPosition: d => {
      return [d.geometry.coordinates[0], d.geometry.coordinates[1], 0]; // Z=0 para pegarlas al suelo
    },
    getScale: d => {
      const r = frpRadius(d.properties.frp || 10);
      return [r, r, r * 1.2]; // 1.2 les da forma de llama vertical
    },
    getColor: d => coreColor(d.properties.frp || 10),
    material: { ambient: 0.45, diffuse: 0.55, shininess: 120, specularColor: [255, 240, 180] },
    pickable: true,
    autoHighlight: true,
    highlightColor: [255, 255, 255, 90],
    onHover: info => { map.getCanvas().style.cursor = info.object ? 'pointer' : ''; },
    onClick: info => { if (info.object) handleFireClick(info.object); },
    parameters: { depthWriteEnabled: false }
  });

  // ── Capa 2: halo exterior (glow estático) ─────────────────
  const glowLayer = new deck.ScatterplotLayer({
    id: 'fires-glow',
    data: features,
    getPosition: d => [d.geometry.coordinates[0], d.geometry.coordinates[1], 0],
    getRadius: d => frpRadius(d.properties.frp || 10) * 1.2, // Reducido a 1.2
    getFillColor: d => glowColor(d.properties.frp || 10),
    filled: true, stroked: false,
    radiusUnits: 'meters',
    pickable: false,
    parameters: { depthWriteEnabled: false }
  });

  // ── Capa 1: anillo de onda expansiva (pulso animado) ──────
  // pulsePhase 0→1: el anillo crece desde 0.6x hasta 2.2x y se desvanece
  const ringScale = 0.6 + pulsePhase * 1.6;
  const ringAlpha = Math.round(80 * Math.pow(1 - pulsePhase, 1.5));

  const pulseLayer = new deck.ScatterplotLayer({
    id: 'fires-pulse',
    data: features,
    getPosition: d => [d.geometry.coordinates[0], d.geometry.coordinates[1], 0],
    getRadius: d => frpRadius(d.properties.frp || 10) * ringScale,
    getFillColor: [0, 0, 0, 0],
    getLineColor: d => ringColor(d.properties.frp || 10, ringAlpha),
    filled: false, stroked: true,
    getLineWidth: d => frpRadius(d.properties.frp || 10) * 0.04,
    radiusUnits: 'meters', lineWidthUnits: 'meters',
    pickable: false,
    updateTriggers: { getRadius: pulsePhase, getLineColor: pulsePhase },
    parameters: { depthWriteEnabled: false }
  });

  // Orden de capas: glow abajo, pulso, núcleo encima
  deckOverlay.setProps({ layers: [glowLayer, pulseLayer, coreLayer] });
}

// ============================================================
// BUCLE DE ANIMACIÓN
// ============================================================
function startAnimation() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  const PERIOD = 2500; // ms por ciclo
  function loop() {
    pulsePhase = (Date.now() % PERIOD) / PERIOD;
    renderDeckLayers(lastActiveFeatures);
    animFrameId = requestAnimationFrame(loop);
  }
  animFrameId = requestAnimationFrame(loop);
}

function stopAnimation() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (deckOverlay)  deckOverlay.setProps({ layers: [] });
}

// ============================================================
// POPUP
// ============================================================
function handleFireClick(feature) {
  if (activePopup) { activePopup.remove(); activePopup = null; }

  const p   = feature.properties;
  const lon = feature.geometry.coordinates[0];
  const lat = feature.geometry.coordinates[1];
  const frp = p.frp || 0;

  // --- Convertir a hora local del usuario ---
  let localDateStr = 'N/A';
  if (p.acq_date) {
    const [y, m, d] = p.acq_date.split('-').map(Number);
    const t = String(parseInt(p.acq_time) || 0).padStart(4, '0');
    const hh = parseInt(t.slice(0, 2));
    const mm = parseInt(t.slice(2, 4));
    
    // 1. Creamos la fecha en UTC
    const utcDate = new Date(Date.UTC(y, m - 1, d, hh, mm, 0));
    
    // 2. El navegador la convierte automáticamente a la zona horaria local del usuario
    localDateStr = utcDate.toLocaleString('es-ES', { 
      day: '2-digit', month: '2-digit', year: 'numeric', 
      hour: '2-digit', minute: '2-digit' 
    });
  }
  // -----------------------------------------

  activePopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, className: 'custom-popup' })
    .setLngLat([lon, lat])
    .setHTML(`
      <div class="popup-header">
        <span class="popup-title">🔥 Incendio</span>
        <div class="popup-controls">
          <span class="popup-btn" id="popup-min">─</span>
          <span class="popup-btn" id="popup-close">✕</span>
        </div>
      </div>
      <div class="popup-body" id="popup-body">
        <div><span style="color:#ff6600;font-weight:600;">🔥 FRP:</span> ${frp} MW</div>
        <div><span style="color:#8b949e;">Detección:</span> <span style="color:#e6edf3;">${localDateStr}</span></div>
        <div><span style="color:#8b949e;">LAT/LONG:</span>
          <span style="font-family:'Courier New',monospace;color:#e6edf3;">${lat.toFixed(5)}, ${lon.toFixed(5)}</span></div>
        <div><span style="color:#8b949e;">Localidad:</span> <span style="color:#e6edf3;">${p.locality || 'N/A'}</span></div>
        <div style="margin-bottom:4px;"><span style="color:#8b949e;">Región:</span> <span style="color:#e6edf3;">${p.NAME_1 || 'N/A'}</span></div>
        <div style="border-top:1px solid #21262d;padding-top:4px;display:flex;gap:6px;font-size:10px;">
          <a href="https://earth.google.com/web/search/${lat},${lon}" target="_blank" style="color:#58a6ff;text-decoration:none;font-weight:500;">🌍 Google Earth</a>
          <span style="color:#30363d;">|</span>
          <a href="https://yandex.com/maps/?pt=${lon},${lat}&z=15" target="_blank" style="color:#58a6ff;text-decoration:none;font-weight:500;">🗺️ Yandex</a>
        </div>
      </div>`)
    .addTo(map);

  activePopup.on('close', () => { activePopup = null; });

  const popupEl = activePopup.getElement();
  if (popupEl) {
    popupEl.style.pointerEvents = 'auto';
    makeDraggable(popupEl, popupEl.querySelector('.popup-header'));
    popupEl.querySelector('#popup-close').addEventListener('click', ev => {
      ev.stopPropagation(); activePopup.remove(); activePopup = null;
    });
    popupEl.querySelector('#popup-min').addEventListener('click', ev => {
      ev.stopPropagation();
      const body = popupEl.querySelector('#popup-body');
      body.classList.toggle('minimized');
      ev.target.textContent = body.classList.contains('minimized') ? '▢' : '─';
    });
    if (window.innerWidth < 640) {
      setTimeout(() => {
        const r = popupEl.getBoundingClientRect();
        if (r.right  > window.innerWidth)  popupEl.style.left = (window.innerWidth  - r.width  - 10) + 'px';
        if (r.bottom > window.innerHeight) popupEl.style.top  = (window.innerHeight - r.height - 10) + 'px';
      }, 10);
    }
  }
}

// ============================================================
// HELPERS ARRASTRE
// ============================================================
function makeDraggable(el, handle) {
  if (!handle) return;
  let ox=0, oy=0, drag=false;
  const xy = e => e.touches?.length ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY};
  function start(e) {
    e.preventDefault(); e.stopPropagation(); drag=true;
    const r=el.getBoundingClientRect(), p=xy(e); ox=p.x-r.left; oy=p.y-r.top;
    el.style.cssText += ';transform:none;position:fixed;margin:0;z-index:3000;left:'+r.left+'px;top:'+r.top+'px';
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',end);
    document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',end);
  }
  function move(e) { if(!drag)return; e.preventDefault(); const p=xy(e); el.style.left=(p.x-ox)+'px'; el.style.top=(p.y-oy)+'px'; }
  function end() { drag=false; document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',end); document.removeEventListener('touchmove',move); document.removeEventListener('touchend',end); }
  handle.addEventListener('mousedown',start); handle.addEventListener('touchstart',start,{passive:false});
}

function makeWindowDraggable(el, handle) {
  if (!el||!handle) return;
  let ox=0,oy=0,drag=false;
  const xy=e=>e.touches?.length?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
  function start(e) {
    if(e.target.closest('.popup-btn'))return;
    e.preventDefault(); drag=true;
    const r=el.getBoundingClientRect(),p=xy(e); ox=p.x-r.left; oy=p.y-r.top;
    el.style.position='fixed'; el.style.left=r.left+'px'; el.style.top=r.top+'px'; el.style.right='auto'; el.style.bottom='auto'; el.style.margin='0';
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',end);
    document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',end);
  }
  function move(e) {
    if(!drag)return; e.preventDefault(); const p=xy(e);
    el.style.left=Math.max(0,Math.min(p.x-ox,window.innerWidth-60))+'px';
    el.style.top=Math.max(0,Math.min(p.y-oy,window.innerHeight-40))+'px';
  }
  function end() { drag=false; document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',end); document.removeEventListener('touchmove',move); document.removeEventListener('touchend',end); }
  handle.addEventListener('mousedown',start); handle.addEventListener('touchstart',start,{passive:false});
}

function makeWindowMinimizable(bodyEl, btnEl) {
  if (!bodyEl||!btnEl) return;
  btnEl.addEventListener('click', ev => {
    ev.stopPropagation();
    const parent = bodyEl.closest('#panel')||bodyEl.closest('#legend-regions');
    bodyEl.classList.toggle('minimized');
    btnEl.textContent = bodyEl.classList.contains('minimized')?'▢':'─';
    if (parent) parent.classList.toggle('minimized');
  });
}

// ============================================================
// CUANDO EL MAPA ESTÁ LISTO
// ============================================================
function whenMapLoaded(cb) { if(map.loaded()) cb(); else map.on('load',cb); }

// ============================================================
// DEEPSTATE
// ============================================================
function updateDeepstate() {
  if (!deepstateData) return;
  const en=document.getElementById('chk-deepstate').checked;
  const fc=document.getElementById('color-fill').value;
  const lc=document.getElementById('color-line').value;
  const fo=parseInt(document.getElementById('opacity-fill').value)/100;
  const lo=parseInt(document.getElementById('opacity-line').value)/100;
  ['deepstate-fill','deepstate-line'].forEach(id=>{if(map.getLayer(id))map.removeLayer(id);});
  if(map.getSource('deepstate'))map.removeSource('deepstate');
  if(!en)return;
  map.addSource('deepstate',{type:'geojson',data:deepstateData});
  map.addLayer({id:'deepstate-fill',type:'fill',source:'deepstate',paint:{'fill-color':fc,'fill-opacity':fo}});
  map.addLayer({id:'deepstate-line',type:'line',source:'deepstate',paint:{'line-color':lc,'line-width':2.5,'line-opacity':lo}});
}

// ============================================================
// PARSEO DE DATETIME UTC DE VIIRS
// acq_date: "2026-06-30" | acq_time: número HHMM (ej: 13 → 00:13, 1340 → 13:40)
// ============================================================
function acqToUTC(props) {
  const d = props.acq_date;
  if (!d) return null;
  const [y, m, day] = d.split('-').map(Number);
  const t = String(parseInt(props.acq_time) || 0).padStart(4, '0');
  const hh = parseInt(t.slice(0, 2));
  const mm = parseInt(t.slice(2, 4));
  return Date.UTC(y, m - 1, day, hh, mm, 0);
}

// ============================================================
// INCENDIOS
// ============================================================
function updateFires() {
  if (activePopup) { activePopup.remove(); activePopup=null; }
  const enabled   = document.getElementById('chk-fires').checked;
  const frpMin    = parseInt(document.getElementById('frp-slider').value)||0;
  const timeRange = parseInt(document.getElementById('time-range-selector').value)||48;

  if (!enabled||firesData.length===0) {
    lastActiveFeatures=[];
    stopAnimation();
    updateRegionLegend();
    document.getElementById('stats-fires').textContent='🔥 0';
    return;
  }

  // Límite en UTC — Date.now() ya es UTC, igual que los timestamps de VIIRS
  const limiteUTC = Date.now() - timeRange * 3600000;

  const filtered = firesData.filter(f=>{
    if((f.properties?.frp||0)<frpMin)return false;
    const acqUTC = acqToUTC(f.properties);
    // Si no hay fecha válida se incluye; si la hay, se filtra por tiempo
    if(acqUTC !== null && acqUTC < limiteUTC) return false;
    return true;
  });

  const byRegion = filtered.filter(f=>{
    if(!selectedRegion)return true;
    const r=f.properties?.NAME_1||'';
    if(selectedRegion==='Otras ubicaciones')return !r||r===''||r==='N/A'||r.toLowerCase()==='desconocida';
    return r===selectedRegion;
  });

  currentFiresFiltered=byRegion;
  lastActiveFeatures=byRegion;

  if(byRegion.length===0){ stopAnimation(); }
  else if(!animFrameId)   { startAnimation(); }

  document.getElementById('stats-fires').textContent='🔥 '+byRegion.length;
  updateRegionLegend();
}

// ============================================================
// LEYENDA
// ============================================================
function updateRegionLegend() {
  const rl=document.getElementById('region-list');
  if(currentFiresFiltered.length===0){
    rl.innerHTML=`<div class="region-item" style="color:#8b949e;text-align:center;padding:4px 0;font-size:10px;">No hay incendios</div>`;
    return;
  }
  const counts={}; let sin=0;
  currentFiresFiltered.forEach(f=>{
    const r=f.properties?.NAME_1;
    if(r&&r!==''&&r!=='N/A'&&r.toLowerCase()!=='desconocida') counts[r]=(counts[r]||0)+1;
    else sin++;
  });
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,15);
  let html=`<div class="region-item all-regions ${!selectedRegion?'active':''}" data-region="all"><span class="region-name">⬅️ Ver todos</span><span class="count">${currentFiresFiltered.length}</span></div>`;
  sorted.forEach(([r,c])=>{html+=`<div class="region-item ${selectedRegion===r?'active':''}" data-region="${r}"><span class="region-name">${r}</span><span class="count">${c}</span></div>`;});
  if(sin>0) html+=`<div class="region-item ${selectedRegion==='Otras ubicaciones'?'active':''}" data-region="Otras ubicaciones" style="border-top:1px solid #30363d;margin-top:2px;padding-top:3px;"><span class="region-name" style="color:#8b949e;">❓ Otras</span><span class="count">${sin}</span></div>`;
  rl.innerHTML=html;
  document.querySelectorAll('.region-item[data-region]').forEach(el=>{
    el.addEventListener('click',function(){
      const r=this.dataset.region;
      if(r==='all') selectedRegion=null;
      else selectedRegion=(selectedRegion===r)?null:r;
      updateFires();
    });
  });
}

// ============================================================
// TERRENO
// ============================================================
function updateTerrain() {
  const en=document.getElementById('chk-terrain').checked;
  const pitch=parseInt(document.getElementById('pitch-slider').value);
  if(en){
    if(!map.getSource('terrainSource'))
      map.addSource('terrainSource',{type:'raster-dem',tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],tileSize:256,encoding:'terrarium',maxzoom:14});
    map.setTerrain({source:'terrainSource',exaggeration:2.0});
    map.setPitch(pitch);
  } else { map.setTerrain(null); map.setPitch(0); }
}

// ============================================================
// MAPA BASE
// ============================================================
function updateAttribution(s){
  const src={satellite:'🛰️ ESRI World Imagery',dark:'🌍 CartoDB Dark Matter',osm:'🌍 OpenStreetMap',topo:'🗺️ OpenTopoMap'};
  document.getElementById('attribution-text').textContent=src[s]||src.dark;
}

function updateBaseMap() {
  if(activePopup){activePopup.remove();activePopup=null;}
  const sel=document.getElementById('map-style-selector').value;
  updateAttribution(sel);
  ['deepstate-fill','deepstate-line','satellite-layer','osm-layer','topo-layer'].forEach(id=>{if(map.getLayer(id))map.removeLayer(id);});
  ['deepstate','fires','satellite-source','osm-source','topo-source'].forEach(id=>{if(map.getSource(id))map.removeSource(id);});

  if(sel==='dark'){
    map.setStyle('https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',{diff:false});
    map.once('style.load',()=>setTimeout(()=>{if(deepstateData)updateDeepstate();updateFires();updateTerrain();},200));
    return;
  }
  map.setStyle({version:8,sources:{},layers:[]});
  const tiles={satellite:['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],osm:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],topo:['https://tile.opentopomap.org/{z}/{x}/{y}.png']};
  const lid=sel+'-layer', sid=sel+'-source';
  map.once('style.load',()=>{
    map.addSource(sid,{type:'raster',tiles:tiles[sel]||tiles.osm,tileSize:256});
    map.addLayer({id:lid,type:'raster',source:sid});
    setTimeout(()=>{if(deepstateData)updateDeepstate();updateFires();updateTerrain();},200);
  });
}

// ============================================================
// CARGA DE DATOS
// ============================================================
fetch(DEEPSTATE_URL).then(r=>r.json()).then(data=>{
  deepstateData=data;
  whenMapLoaded(()=>{updateDeepstate();updateTerrain();});
}).catch(e=>console.error('DeepState error:',e));

fetch(FIRMS_URL).then(r=>r.json()).then(data=>{
  firesData=data.features||[];
  whenMapLoaded(()=>updateFires());
}).catch(e=>console.error('FIRMS error:',e));

// ============================================================
// CONTROLES
// ============================================================
document.getElementById('map-style-selector').addEventListener('change',updateBaseMap);
document.getElementById('time-range-selector').addEventListener('change',()=>{selectedRegion=null;updateFires();});
document.getElementById('chk-deepstate').addEventListener('change',updateDeepstate);
document.getElementById('color-fill').addEventListener('input',updateDeepstate);
document.getElementById('color-line').addEventListener('input',updateDeepstate);
document.getElementById('opacity-fill').addEventListener('input',function(){document.getElementById('val-opacity-fill').textContent=(this.value/100).toFixed(2);updateDeepstate();});
document.getElementById('opacity-line').addEventListener('input',function(){document.getElementById('val-opacity-line').textContent=(this.value/100).toFixed(2);updateDeepstate();});
document.getElementById('chk-fires').addEventListener('change',updateFires);
document.getElementById('frp-slider').addEventListener('input',function(){document.getElementById('val-frp').textContent=this.value;updateFires();});
document.getElementById('chk-terrain').addEventListener('change',updateTerrain);
document.getElementById('pitch-slider').addEventListener('input',function(){document.getElementById('val-pitch').textContent=this.value;updateTerrain();});

// ============================================================
// VENTANAS ARRASTRABLES
// ============================================================
makeWindowDraggable(document.getElementById('panel'),document.getElementById('panel-header'));
makeWindowMinimizable(document.getElementById('panel-body'),document.getElementById('panel-min'));
makeWindowDraggable(document.getElementById('legend-regions'),document.getElementById('legend-header'));
makeWindowMinimizable(document.getElementById('legend-body'),document.getElementById('legend-min'));

// ============================================================
// INICIO
// ============================================================
map.on('load',()=>{
  initDeckGL();
  updateTerrain();
  updateAttribution('dark');
  console.log('✅ Visor 3D + deck.gl + explosiones listo');
});
</script>
