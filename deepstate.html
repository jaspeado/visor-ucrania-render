<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DeepState - Línea del Frente</title>
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 8px;
            text-align: center;
        }
        #loading span {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">⏳ Cargando CesiumJS...</div>
    <div id="info">🌍 Línea del Frente - DeepState</div>
    <div id="cesiumContainer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Widgets/widgets.css" 
          rel="stylesheet">

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzMzVhMzc5NS02YmNjLTQwMTUtYjIyMC03YWQ5ZDJjYWY4M2QiLCJpZCI6NDUwMjY4LCJzdWIiOiJqYXZpZ2VvIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlZpc29yIEdpdEh1YiBQYWdlcyIsImlhdCI6MTc4Mjc0NTQwMH0.NzbI9bglV_dWgoFQLat_euWpVpJhRkOE8NQwcAaEek8';
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';

        // ============================================================
        // INICIALIZAR CESIUM
        // ============================================================
        Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            timeline: false,
            animation: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
        });

        viewer.imageryLayers.addImageryProvider(
            new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            })
        );

        // ============================================================
        // CARGAR DEEPSTATE
        // ============================================================
        document.getElementById('loading').textContent = '⏳ Cargando DeepState...';

        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
        script.onload = function() {
            fetch(DEEPSTATE_URL)
                .then(r => r.arrayBuffer())
                .then(buffer => {
                    const data = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                    const geojson = JSON.parse(data);
                    const features = geojson.features || [];
                    console.log('📊 DeepState:', features.length, 'polígonos');

                    const fechas = new Set();
                    features.forEach(f => {
                        const d = f.properties?.date || '';
                        if (d) fechas.add(d);
                    });
                    const fechasOrdenadas = Array.from(fechas).sort();
                    const ultimaFecha = fechasOrdenadas[fechasOrdenadas.length - 1] || '';
                    console.log('📅 Última fecha:', ultimaFecha);

                    const filtered = features.filter(f =>
                        (f.properties?.date || '') === ultimaFecha
                    );
                    console.log('📊 Polígonos para', ultimaFecha, ':', filtered.length);

                    document.getElementById('loading').textContent = '⏳ Dibujando polígonos...';

                    const dataSource = new Cesium.GeoJsonDataSource();
                    dataSource.load({
                        type: 'FeatureCollection',
                        features: filtered
                    }, {
                        stroke: Cesium.Color.WHITE,
                        fill: Cesium.Color.RED.withAlpha(0.5),
                        strokeWidth: 3,
                        clampToGround: true,
                    }).then(function(ds) {
                        viewer.dataSources.add(ds);
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('info').textContent =
                            '🌍 Línea del Frente | ' + filtered.length + ' polígonos | ' + ultimaFecha;

                        viewer.camera.flyTo({
                            destination: Cesium.Cartesian3.fromDegrees(31.0, 48.5, 500000),
                            duration: 2
                        });

                        console.log('✅ DeepState dibujado correctamente');
                    }).catch(function(e) {
                        console.error('❌ Error al dibujar:', e);
                        document.getElementById('loading').textContent = '❌ Error: ' + e.message;
                    });

                })
                .catch(e => {
                    console.error('❌ Error:', e);
                    document.getElementById('loading').textContent = '❌ Error: ' + e.message;
                });
        };
        document.head.appendChild(script);

        // ============================================================
        // CLIC PARA INFORMACIÓN
        // ============================================================
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(e) {
            const picked = viewer.scene.pick(e.position);
            if (picked && picked.id && picked.id.properties) {
                const props = picked.id.properties;
                const control = props.control ? props.control.getValue() : 'desconocido';
                const date = props.date ? props.date.getValue() : 'N/A';
                alert('🟥 Control: ' + control + '\n📅 Fecha: ' + date);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    </script>
</body>
</html>
