<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DeepState - Cesium</title>
    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">⏳ Cargando DeepState...</div>
    <div id="info">🌍 DeepState - Línea del Frente (Cesium)</div>
    <div id="cesiumContainer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Cesium.js">
    </script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.128/Build/Cesium/Widgets/widgets.css" 
          rel="stylesheet">

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzMzVhMzc5NS02YmNjLTQwMTUtYjIyMC03YWQ5ZDJjYWY4M2QiLCJpZCI6NDUwMjY4LCJzdWIiOiJqYXZpZ2VvIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlZpc29yIEdpdEh1YiBQYWdlcyIsImlhdCI6MTc4Mjc0NTQwMH0.NzbI9bglV_dWgoFQLat_euWpVpJhRkOE8NQwcAaEek8';
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/jaspeado/firms-ukraine-tracker/main/deepstate_actual.geojson';

        Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            timeline: false,
            animation: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
        });

        viewer.imageryLayers.addImageryProvider(
            new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            })
        );

        // ============================================================
        // CARGAR DEEPSTATE
        // ============================================================
        fetch(DEEPSTATE_URL)
            .then(r => r.json())
            .then(geojson => {
                const features = geojson.features || [];
                console.log('📊 DeepState:', features.length);

                const dataSource = new Cesium.GeoJsonDataSource();
                dataSource.load(geojson, {
                    stroke: Cesium.Color.YELLOW,
                    fill: Cesium.Color.RED.withAlpha(0.6),
                    strokeWidth: 3,
                    clampToGround: true,
                }).then(function(ds) {
                    viewer.dataSources.add(ds);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('info').textContent =
                        '🌍 DeepState | ' + features.length + ' polígonos | 🔴 Relleno rojo';

                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(31.0, 48.5, 500000),
                        duration: 2
                    });

                    console.log('✅ DeepState dibujado en Cesium');
                });
            })
            .catch(e => {
                console.error('❌ Error:', e);
                document.getElementById('loading').textContent = '❌ Error: ' + e.message;
            });
    </script>
</body>
</html>
